<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐡 דג הבלון</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #001020;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas { display:block; }

/* ===== HUD ===== */
.hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    z-index: 10;
    pointer-events: none;
}
.hud-item {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 6px 16px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
}
.hud-coins { color: #ffd700; }
.hud-score { color: #4ade80; }
.hud-level { color: #60a5fa; }

/* ===== LOBBY ===== */
#lobby {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #001030 0%, #003060 100%);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 10px;
}
#lobby h1 { font-size: 42px; margin-bottom: 4px; }
#lobby .sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 20px; }
#lobby .saved-coins { color: #ffd700; font-size: 18px; margin-bottom: 20px; }
.btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    min-width: 200px;
    transition: transform 0.1s;
    font-family: inherit;
}
.btn:active { transform: scale(0.95); }
.btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
}

/* ===== GAME OVER ===== */
#gameover {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 12px;
}
#gameover h2 { font-size: 32px; color: #f87171; }
#gameover .stats { color: rgba(255,255,255,0.7); font-size: 16px; }
#gameover .earned { color: #ffd700; font-size: 22px; font-weight: 700; }

/* ===== INFLATE BUTTON (mobile) ===== */
#inflate-btn {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,165,0,0.6), rgba(255,100,0,0.3));
    border: 3px solid rgba(255,165,0,0.5);
    color: white;
    font-size: 28px;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    backdrop-filter: blur(4px);
}

/* ===== PARTICLES ===== */
.coin-particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    font-weight: 800;
    color: #ffd700;
    z-index: 50;
    animation: particleUp 0.8s ease-out forwards;
}
@keyframes particleUp {
    0% { opacity:1; transform: translateY(0) scale(1); }
    100% { opacity:0; transform: translateY(-60px) scale(1.4); }
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
    <h1>🐡 דג הבלון</h1>
    <p class="sub">אסוף דגים • היזהר מכרישים • הילחם בבוס</p>
    <p class="saved-coins">💰 <span id="lobby-coins">0</span> מטבעות</p>
    <button class="btn" onclick="startGame()">🎮 התחל משחק</button>
</div>

<!-- GAME OVER -->
<div id="gameover">
    <h2>💀 נפסלת!</h2>
    <p class="stats">ניקוד: <span id="go-score">0</span> &nbsp;|&nbsp; שלב: <span id="go-level">1</span></p>
    <p class="earned">+<span id="go-earned">0</span> 🪙</p>
    <p class="stats">סה״כ מטבעות: <span id="go-total">0</span></p>
    <button class="btn" onclick="startGame()">🔄 שחק שוב</button>
    <button class="btn btn-secondary" onclick="goLobby()">🏠 לובי</button>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none;">
    <div class="hud-item hud-coins">🪙 <span id="hud-coins">0</span></div>
    <div class="hud-item hud-score">⭐ <span id="hud-score">0</span></div>
    <div class="hud-item hud-level">שלב <span id="hud-level">1</span></div>
</div>

<!-- INFLATE BUTTON (mobile) -->
<div id="inflate-btn">🐡</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== SAVED DATA =====
function loadCoins() {
    return Number(localStorage.getItem("puff_coins")) || 0;
}
function saveCoins(val) {
    localStorage.setItem("puff_coins", String(val));
}

let totalCoins = loadCoins();
document.getElementById("lobby-coins").textContent = totalCoins;

// ===== GAME STATE =====
let player, fishList, sharks, boss, bubbles;
let gameRunning = false;
let score, earnedCoins, level, levelTimer;
let spawnFishInterval, spawnSharkInterval;
let shakeTimer = 0;

function initGame() {
    player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        vx: 0, vy: 0,
        size: 22,
        inflated: false,
        inflateTimer: 0,
        trail: []
    };
    fishList = [];
    sharks = [];
    boss = null;
    bubbles = [];
    score = 0;
    earnedCoins = 0;
    level = 1;
    levelTimer = 0;
    shakeTimer = 0;
}

// ===== FISH TYPES (drawn, no sprites) =====
const fishTypes = [
    { color: "#ff6b6b", glowColor: "rgba(255,107,107,0.3)", value: 1, size: 16 },
    { color: "#ffd93d", glowColor: "rgba(255,217,61,0.3)", value: 2, size: 18 },
    { color: "#6bcb77", glowColor: "rgba(107,203,119,0.3)", value: 3, size: 20 },
    { color: "#4d96ff", glowColor: "rgba(77,150,255,0.3)", value: 5, size: 22 },
    { color: "#ff6fff", glowColor: "rgba(255,111,255,0.3)", value: 10, size: 14 }
];

// ===== DRAWING FUNCTIONS =====
function drawFishShape(x, y, size, color, glowColor, dir) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Tail
    ctx.beginPath();
    ctx.moveTo(-size * 0.8, 0);
    ctx.lineTo(-size * 1.5, -size * 0.6);
    ctx.lineTo(-size * 1.5, size * 0.6);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    // Eye
    ctx.beginPath();
    ctx.arc(size * 0.4, -size * 0.1, size * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.45, -size * 0.1, size * 0.09, 0, Math.PI * 2);
    ctx.fillStyle = "#111";
    ctx.fill();
    ctx.restore();
}

function drawShark(x, y, size, dir) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#667";
    ctx.fill();
    // Dorsal fin
    ctx.beginPath();
    ctx.moveTo(-size * 0.1, -size * 0.35);
    ctx.lineTo(size * 0.2, -size * 0.9);
    ctx.lineTo(size * 0.4, -size * 0.35);
    ctx.closePath();
    ctx.fillStyle = "#556";
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-size * 0.8, 0);
    ctx.lineTo(-size * 1.4, -size * 0.5);
    ctx.lineTo(-size * 1.1, 0);
    ctx.lineTo(-size * 1.4, size * 0.5);
    ctx.closePath();
    ctx.fillStyle = "#556";
    ctx.fill();
    // Belly
    ctx.beginPath();
    ctx.ellipse(0, size * 0.1, size * 0.7, size * 0.2, 0, 0, Math.PI);
    ctx.fillStyle = "#aab";
    ctx.fill();
    // Eye
    ctx.beginPath();
    ctx.arc(size * 0.5, -size * 0.05, size * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.53, -size * 0.05, size * 0.05, 0, Math.PI * 2);
    ctx.fillStyle = "#c00";
    ctx.fill();
    // Teeth
    ctx.beginPath();
    ctx.moveTo(size * 0.7, size * 0.05);
    for (let i = 0; i < 4; i++) {
        let tx = size * 0.7 - i * size * 0.12;
        ctx.lineTo(tx - size * 0.06, size * 0.15);
        ctx.lineTo(tx - size * 0.12, size * 0.05);
    }
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.restore();
}

function drawPuffer(x, y, size, inflated) {
    ctx.save();
    ctx.translate(x, y);

    let bodyColor = inflated ? "#ff8c00" : "#ffcc00";
    let bodySize = inflated ? size * 1.8 : size;

    // Glow
    ctx.shadowColor = bodyColor;
    ctx.shadowBlur = inflated ? 25 : 12;

    // Body
    ctx.beginPath();
    ctx.arc(0, 0, bodySize, 0, Math.PI * 2);
    ctx.fillStyle = bodyColor;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Belly highlight
    ctx.beginPath();
    ctx.arc(0, bodySize * 0.15, bodySize * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fill();

    // Spikes when inflated
    if (inflated) {
        ctx.strokeStyle = "#cc6600";
        ctx.lineWidth = 2.5;
        for (let i = 0; i < 16; i++) {
            let a = i * (Math.PI * 2 / 16) + Math.sin(Date.now() / 200 + i) * 0.1;
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * bodySize, Math.sin(a) * bodySize);
            ctx.lineTo(Math.cos(a) * bodySize * 1.4, Math.sin(a) * bodySize * 1.4);
            ctx.stroke();
        }
    }

    // Eyes
    let eyeOff = bodySize * 0.35;
    for (let side of [-1, 1]) {
        ctx.beginPath();
        ctx.arc(side * eyeOff, -bodySize * 0.2, bodySize * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(side * eyeOff + side * 2, -bodySize * 0.18, bodySize * 0.11, 0, Math.PI * 2);
        ctx.fillStyle = "#222";
        ctx.fill();
    }

    // Mouth
    ctx.beginPath();
    ctx.arc(0, bodySize * 0.15, bodySize * 0.15, 0, Math.PI);
    ctx.strokeStyle = "#b07800";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fins
    for (let side of [-1, 1]) {
        ctx.beginPath();
        ctx.ellipse(side * bodySize * 0.9, 0, bodySize * 0.25, bodySize * 0.12,
            side * 0.3 + Math.sin(Date.now() / 150) * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,200,0,0.5)";
        ctx.fill();
    }

    ctx.restore();
}

function drawBoss(x, y, size, hp, maxHp) {
    ctx.save();
    ctx.translate(x, y);

    // Body
    ctx.shadowColor = "#f00";
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#8b0000";
    ctx.fill();
    ctx.shadowBlur = 0;

    // Armor plates
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.ellipse(i * size * 0.25, 0, size * 0.12, size * 0.45, 0, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,0,0,0.3)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Dorsal fin
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, -size * 0.45);
    ctx.lineTo(0, -size * 1.1);
    ctx.lineTo(size * 0.3, -size * 0.45);
    ctx.fillStyle = "#a00";
    ctx.fill();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-size * 0.8, 0);
    ctx.lineTo(-size * 1.3, -size * 0.5);
    ctx.lineTo(-size * 1.0, 0);
    ctx.lineTo(-size * 1.3, size * 0.5);
    ctx.closePath();
    ctx.fillStyle = "#a00";
    ctx.fill();

    // Eyes (angry)
    for (let side of [-1, 1]) {
        ctx.beginPath();
        ctx.arc(side * size * 0.4, -size * 0.1, size * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "#ff0";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(side * size * 0.42, -size * 0.1, size * 0.06, 0, Math.PI * 2);
        ctx.fillStyle = "#f00";
        ctx.fill();
        // Angry brow
        ctx.beginPath();
        ctx.moveTo(side * size * 0.25, -size * 0.25);
        ctx.lineTo(side * size * 0.55, -size * 0.18);
        ctx.strokeStyle = "#600";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // Teeth
    ctx.fillStyle = "#fff";
    for (let i = -3; i <= 3; i++) {
        ctx.beginPath();
        let tx = size * 0.65 + i * size * 0.07;
        ctx.moveTo(tx, size * 0.1);
        ctx.lineTo(tx - 4, size * 0.25);
        ctx.lineTo(tx + 4, size * 0.25);
        ctx.closePath();
        ctx.fill();
    }

    // HP bar
    let barW = size * 1.6;
    let barH = 8;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(-barW / 2, -size * 0.7, barW, barH);
    ctx.fillStyle = hp > maxHp * 0.3 ? "#f44" : "#ff0";
    ctx.fillRect(-barW / 2, -size * 0.7, barW * (hp / maxHp), barH);

    ctx.restore();
}

// ===== WATER BACKGROUND =====
let waterOffset = 0;
function drawWater() {
    // Gradient
    let g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, "#001830");
    g.addColorStop(0.5, "#003060");
    g.addColorStop(1, "#005090");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle wave lines
    waterOffset += 0.3;
    ctx.strokeStyle = "rgba(100,180,255,0.06)";
    ctx.lineWidth = 1.5;
    for (let row = 0; row < 12; row++) {
        ctx.beginPath();
        let baseY = row * (canvas.height / 10) + (waterOffset % 80);
        for (let x = 0; x < canvas.width; x += 5) {
            ctx.lineTo(x, baseY + Math.sin(x / 80 + waterOffset / 20 + row) * 8);
        }
        ctx.stroke();
    }
}

// ===== BUBBLES =====
function spawnBubble(x, y) {
    bubbles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y,
        r: 2 + Math.random() * 4,
        speed: 0.5 + Math.random() * 1.5,
        life: 1
    });
}

function updateBubbles() {
    for (let i = bubbles.length - 1; i >= 0; i--) {
        let b = bubbles[i];
        b.y -= b.speed;
        b.x += Math.sin(b.y / 20) * 0.3;
        b.life -= 0.008;
        if (b.life <= 0) { bubbles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(150,220,255,${b.life * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

// ===== SPAWN FUNCTIONS =====
function spawnFish() {
    if (!gameRunning) return;
    let type = fishTypes[Math.floor(Math.random() * fishTypes.length)];
    // rare fish less common
    if (type.value >= 10 && Math.random() > 0.15) {
        type = fishTypes[Math.floor(Math.random() * 4)];
    }
    let edge = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    let sp = 0.5 + Math.random() * 1.5;
    if (edge === 0) { x = -30; y = Math.random() * canvas.height; vx = sp; vy = (Math.random()-0.5)*0.5; }
    else if (edge === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; vx = -sp; vy = (Math.random()-0.5)*0.5; }
    else if (edge === 2) { y = -30; x = Math.random() * canvas.width; vy = sp; vx = (Math.random()-0.5)*0.5; }
    else { y = canvas.height + 30; x = Math.random() * canvas.width; vy = -sp; vx = (Math.random()-0.5)*0.5; }

    fishList.push({ x, y, vx, vy, ...type, dir: vx > 0 ? 1 : -1, wobble: Math.random() * 100 });
}

function spawnShark() {
    if (!gameRunning) return;
    let edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = -60; y = Math.random() * canvas.height; }
    else if (edge === 1) { x = canvas.width + 60; y = Math.random() * canvas.height; }
    else if (edge === 2) { y = -60; x = Math.random() * canvas.width; }
    else { y = canvas.height + 60; x = Math.random() * canvas.width; }

    let speed = 1.2 + level * 0.25 + Math.random() * 0.5;
    let sharkSize = 35 + Math.random() * 15;

    sharks.push({ x, y, size: sharkSize, speed, dir: 1 });
}

// ===== CONTROLS =====
let keys = {};
let touchTarget = null;

document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " ") player.inflated = true;
    e.preventDefault();
});
document.addEventListener("keyup", e => {
    keys[e.key] = false;
    if (e.key === " ") player.inflated = false;
});

// Joystick-style touch: tap & drag to steer
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    let t = e.touches[0];
    touchTarget = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    let t = e.touches[0];
    touchTarget = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener("touchend", e => {
    e.preventDefault();
    touchTarget = null;
});

// Inflate button (mobile)
const infBtn = document.getElementById("inflate-btn");
infBtn.addEventListener("touchstart", e => { e.preventDefault(); e.stopPropagation(); player.inflated = true; });
infBtn.addEventListener("touchend", e => { e.preventDefault(); e.stopPropagation(); player.inflated = false; });

// ===== LEVELS =====
function getMaxBossHp() { return 10 + level * 5; }

function levelUp() {
    level++;
    document.getElementById("hud-level").textContent = level;
    boss = null;
    // bonus coins for level clear
    let bonus = level * 5;
    earnedCoins += bonus;
    showParticle(canvas.width / 2, canvas.height / 2, `שלב ${level}! +${bonus}🪙`);
    updateHUD();
}

// ===== HUD =====
function updateHUD() {
    document.getElementById("hud-coins").textContent = earnedCoins;
    document.getElementById("hud-score").textContent = score;
    document.getElementById("hud-level").textContent = level;
}

function showParticle(x, y, text) {
    let el = document.createElement("div");
    el.className = "coin-particle";
    el.textContent = text;
    el.style.left = x - 30 + "px";
    el.style.top = y + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
}

// ===== MAIN GAME LOOP =====
function gameLoop() {
    if (!gameRunning) return;
    requestAnimationFrame(gameLoop);

    // Screen shake
    ctx.save();
    if (shakeTimer > 0) {
        shakeTimer--;
        ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
    }

    drawWater();

    let dt = 1; // fixed step

    // ===== MOVE PLAYER =====
    let speed = 4.5;
    let ax = 0, ay = 0;
    if (keys["ArrowUp"] || keys["w"]) ay -= 1;
    if (keys["ArrowDown"] || keys["s"]) ay += 1;
    if (keys["ArrowLeft"] || keys["a"]) ax -= 1;
    if (keys["ArrowRight"] || keys["d"]) ax += 1;

    // Touch movement
    if (touchTarget) {
        let dx = touchTarget.x - player.x;
        let dy = touchTarget.y - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 10) {
            ax = dx / dist;
            ay = dy / dist;
        }
    }

    let mag = Math.hypot(ax, ay);
    if (mag > 0) { ax /= mag; ay /= mag; }

    player.vx += ax * 0.6;
    player.vy += ay * 0.6;
    player.vx *= 0.88;
    player.vy *= 0.88;
    player.x += player.vx * speed * 0.5;
    player.y += player.vy * speed * 0.5;

    // Clamp to screen
    let ps = player.inflated ? player.size * 1.8 : player.size;
    player.x = Math.max(ps, Math.min(canvas.width - ps, player.x));
    player.y = Math.max(ps, Math.min(canvas.height - ps, player.y));

    // Trail
    player.trail.push({ x: player.x, y: player.y, life: 1 });
    if (player.trail.length > 15) player.trail.shift();

    // Draw trail
    for (let t of player.trail) {
        t.life -= 0.07;
        if (t.life > 0) {
            ctx.beginPath();
            ctx.arc(t.x, t.y, ps * t.life * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,200,0,${t.life * 0.1})`;
            ctx.fill();
        }
    }

    // Inflate cooldown
    if (player.inflated) {
        player.inflateTimer++;
        if (player.inflateTimer > 120) { // max 2 seconds
            player.inflated = false;
            player.inflateTimer = 0;
        }
    } else {
        if (player.inflateTimer > 0) player.inflateTimer -= 2;
        if (player.inflateTimer < 0) player.inflateTimer = 0;
    }

    // Bubbles from player
    if (Math.random() < 0.15) spawnBubble(player.x, player.y - ps);

    drawPuffer(player.x, player.y, player.size, player.inflated);

    // ===== FISH =====
    for (let i = fishList.length - 1; i >= 0; i--) {
        let f = fishList[i];
        f.x += f.vx;
        f.y += f.vy + Math.sin(f.wobble + Date.now() / 500) * 0.3;
        f.dir = f.vx > 0 ? 1 : -1;

        // Remove if off-screen
        if (f.x < -80 || f.x > canvas.width + 80 || f.y < -80 || f.y > canvas.height + 80) {
            fishList.splice(i, 1);
            continue;
        }

        drawFishShape(f.x, f.y, f.size, f.color, f.glowColor, f.dir);

        // Collision with player
        let dist = Math.hypot(player.x - f.x, player.y - f.y);
        if (dist < ps + f.size * 0.6) {
            earnedCoins += f.value;
            score++;
            fishList.splice(i, 1);
            showParticle(f.x, f.y, `+${f.value}🪙`);
            spawnBubble(f.x, f.y);
            spawnBubble(f.x, f.y);
            updateHUD();
        }
    }

    // ===== SHARKS =====
    for (let i = sharks.length - 1; i >= 0; i--) {
        let s = sharks[i];
        let dx = player.x - s.x;
        let dy = player.y - s.y;
        let dist = Math.hypot(dx, dy);

        if (dist > 0) {
            s.x += (dx / dist) * s.speed;
            s.y += (dy / dist) * s.speed;
        }
        s.dir = dx > 0 ? 1 : -1;

        drawShark(s.x, s.y, s.size, s.dir);

        // Hit player
        if (dist < ps + s.size * 0.5) {
            if (player.inflated) {
                // Deflect shark!
                sharks.splice(i, 1);
                score += 2;
                earnedCoins += 3;
                shakeTimer = 6;
                showParticle(s.x, s.y, "💥 +3🪙");
                for (let b = 0; b < 5; b++) spawnBubble(s.x, s.y);
                updateHUD();
            } else {
                die();
                return;
            }
        }

        // Remove if way off-screen
        if (s.x < -200 || s.x > canvas.width + 200 || s.y < -200 || s.y > canvas.height + 200) {
            sharks.splice(i, 1);
        }
    }

    // ===== BOSS =====
    if (score > 0 && score % 15 === 0 && !boss && score > (level - 1) * 15) {
        let maxHp = getMaxBossHp();
        boss = {
            x: canvas.width / 2,
            y: -80,
            size: 60 + level * 8,
            hp: maxHp,
            maxHp: maxHp,
            speed: 1 + level * 0.2,
            dir: 1
        };
    }

    if (boss) {
        let dx = player.x - boss.x;
        let dy = player.y - boss.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 0) {
            boss.x += (dx / dist) * boss.speed;
            boss.y += (dy / dist) * boss.speed;
        }
        boss.dir = dx > 0 ? 1 : -1;

        drawBoss(boss.x, boss.y, boss.size, boss.hp, boss.maxHp);

        if (dist < ps + boss.size * 0.5) {
            if (player.inflated) {
                boss.hp -= 2;
                shakeTimer = 4;
                showParticle(boss.x, boss.y - boss.size, `💥 ${boss.hp}/${boss.maxHp}`);
                // Knockback
                boss.x -= (dx / dist) * 30;
                boss.y -= (dy / dist) * 30;
                if (boss.hp <= 0) {
                    earnedCoins += 20 + level * 10;
                    score += 5;
                    shakeTimer = 12;
                    showParticle(boss.x, boss.y, `🏆 בוס הובס! +${20 + level * 10}🪙`);
                    for (let b = 0; b < 12; b++) spawnBubble(boss.x, boss.y);
                    levelUp();
                }
                updateHUD();
            } else {
                die();
                return;
            }
        }
    }

    updateBubbles();
    ctx.restore();

    // Spawn control
    levelTimer++;
}

// ===== START / DIE / LOBBY =====
function startGame() {
    document.getElementById("lobby").style.display = "none";
    document.getElementById("gameover").style.display = "none";
    document.getElementById("hud").style.display = "flex";
    if (isMobile) infBtn.style.display = "flex";

    initGame();
    updateHUD();
    gameRunning = true;

    // Clear old intervals
    clearInterval(spawnFishInterval);
    clearInterval(spawnSharkInterval);
    spawnFishInterval = setInterval(spawnFish, 800);
    spawnSharkInterval = setInterval(spawnShark, 4000);

    // Pre-spawn some fish
    for (let i = 0; i < 6; i++) spawnFish();

    gameLoop();
}

function die() {
    gameRunning = false;
    clearInterval(spawnFishInterval);
    clearInterval(spawnSharkInterval);
    if (isMobile) infBtn.style.display = "none";
    document.getElementById("hud").style.display = "none";

    // Save coins
    totalCoins += earnedCoins;
    saveCoins(totalCoins);

    // Show game-over
    document.getElementById("go-score").textContent = score;
    document.getElementById("go-level").textContent = level;
    document.getElementById("go-earned").textContent = earnedCoins;
    document.getElementById("go-total").textContent = totalCoins;
    document.getElementById("gameover").style.display = "flex";
}

function goLobby() {
    document.getElementById("gameover").style.display = "none";
    document.getElementById("lobby-coins").textContent = totalCoins;
    document.getElementById("lobby").style.display = "flex";
}
</script>
