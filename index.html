<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pufferfish Game FIXED</title>

<style>
body { margin:0; overflow:hidden; background:#002; color:white; font-family:Arial; }
canvas { display:block; }

.panel {
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,40,0.9);
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
}

button {
 padding:10px 20px;
 margin:10px;
 font-size:18px;
}

#ui {
 position:absolute;
 top:10px;
 right:10px;
}
</style>
</head>

<body>

<div id="menu" class="panel">
<h1>🐡 Pufferfish</h1>
<button onclick="start()">Start</button>
</div>

<div id="pause" class="panel" style="display:none;">
<h1>Paused</h1>
<button onclick="resume()">Resume</button>
</div>

<div id="ui">
💰 <span id="coins">0</span> | 🏆 <span id="level">1</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// ===== GAME STATE =====
let running = false;
let player, fish=[], sharks=[], boss=null;
let keys={};
let coins=0, level=1;

// ===== INPUT =====
document.addEventListener("keydown",e=>{
 keys[e.key.toLowerCase()] = true;

 if(e.key===" ") player.inflated=true;

 if(e.key==="Escape" && running){
  pause();
 }
});

document.addEventListener("keyup",e=>{
 keys[e.key.toLowerCase()] = false;
 if(e.key===" ") player.inflated=false;
});

// ===== DRAW =====
function drawPuffer(p){
 let size = p.inflated ? 60 : 30;

 ctx.fillStyle="yellow";
 ctx.beginPath();
 ctx.arc(p.x,p.y,size,0,Math.PI*2);
 ctx.fill();

 // spikes
 for(let i=0;i<20;i++){
  let a=i*(Math.PI*2/20);
  ctx.beginPath();
  ctx.moveTo(p.x+Math.cos(a)*size,p.y+Math.sin(a)*size);
  ctx.lineTo(p.x+Math.cos(a)*(size+10),p.y+Math.sin(a)*(size+10));
  ctx.stroke();
 }

 // eye
 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(p.x+10,p.y-10,5,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle="black";
 ctx.beginPath();
 ctx.arc(p.x+10,p.y-10,2,0,Math.PI*2);
 ctx.fill();
}

function drawFish(f){
 ctx.fillStyle=f.color;
 ctx.beginPath();
 ctx.ellipse(f.x,f.y,f.size,f.size*0.6,0,0,Math.PI*2);
 ctx.fill();
}

function drawBoss(b){
 ctx.fillStyle="darkgreen";
 ctx.beginPath();
 ctx.ellipse(b.x,b.y,b.size,b.size*0.6,0,0,Math.PI*2);
 ctx.fill();

 // light
 ctx.strokeStyle="yellow";
 ctx.beginPath();
 ctx.moveTo(b.x,b.y-b.size);
 ctx.lineTo(b.x+20,b.y-b.size-20);
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(b.x+20,b.y-b.size-20,6,0,Math.PI*2);
 ctx.fill();
}

// ===== LOOP =====
function loop(){
 if(!running) return;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 let speed = 4;

 if(keys["w"]||keys["arrowup"]) player.y-=speed;
 if(keys["s"]||keys["arrowdown"]) player.y+=speed;
 if(keys["a"]||keys["arrowleft"]) player.x-=speed;
 if(keys["d"]||keys["arrowright"]) player.x+=speed;

 let size = player.inflated ? 60 : 30;

 // ===== BORDER FIX =====
 player.x = Math.max(size, Math.min(canvas.width-size, player.x));
 player.y = Math.max(size, Math.min(canvas.height-size, player.y));

 drawPuffer(player);

 // ===== FISH =====
 fish.forEach((f,i)=>{
  drawFish(f);

  let d = Math.hypot(player.x-f.x,player.y-f.y);

  if(d < size){
   coins++;
   document.getElementById("coins").innerText = coins;
   fish.splice(i,1);

   if(coins % 10 === 0){
    level++;
    document.getElementById("level").innerText = level;
   }
  }
 });

 // ===== SHARKS =====
 sharks.forEach(s=>{
  let dx=player.x-s.x;
  let dy=player.y-s.y;
  let d=Math.hypot(dx,dy) || 1;

  s.x += dx/d * s.speed;
  s.y += dy/d * s.speed;

  drawFish({...s,color:"gray"});

  if(d < 40) die();
 });

 // ===== BOSS =====
 if(level >= 3 && !boss){
  boss = {x:200,y:200,size:80,hp:20};
 }

 if(boss){
  drawBoss(boss);

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let d=Math.hypot(dx,dy) || 1;

  boss.x += dx/d * 1.2;

  if(d < 80) die();

  if(player.inflated && d < 120){
   boss.hp--;

   if(boss.hp <= 0){
    alert("YOU WIN 🔥");
    boss=null;
   }
  }
 }

 requestAnimationFrame(loop);
}

// ===== SPAWN =====
let fishInterval, sharkInterval;

function spawnFish(){
 fish.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  size:20,
  color:"cyan"
 });
}

function spawnShark(){
 sharks.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  size:40,
  speed:2+level*0.3
 });
}

// ===== GAME =====
function start(){
 document.getElementById("menu").style.display="none";

 player = {x:300,y:300,inflated:false};

 running = true;

 clearInterval(fishInterval);
 clearInterval(sharkInterval);

 fishInterval = setInterval(spawnFish,800);
 sharkInterval = setInterval(spawnShark,4000);

 loop();
}

function pause(){
 running=false;
 document.getElementById("pause").style.display="flex";
}

function resume(){
 running=true;
 document.getElementById("pause").style.display="none";
 loop();
}

function die(){
 alert("💀 Game Over");
 location.reload();
}
</script>

</body>
</html>
