<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>🐡 דג הבלון</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0af, #003);
    overflow: hidden;
    font-family: Arial;
}

canvas { display: block; }

#ui {
    position: absolute;
    top: 10px;
    right: 10px;
    color: white;
}

#lobby, #shop {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,50,0.9);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="lobby">
<h1>🐡 דג הבלון</h1>
<p>אסוף דגים, ברח מכרישים ונצח את הבוס!</p>
<button onclick="startGame()">🎮 התחל</button>
<button onclick="openShop()">🛒 חנות</button>
</div>

<div id="shop" style="display:none;">
<h1>🛒 חנות סקינים</h1>
<button onclick="buySkin('yellow',0)">🟡 רגיל (חינם)</button>
<button onclick="buySkin('red',50)">🔴 אדום (50)</button>
<button onclick="buySkin('blue',100)">🔵 כחול (100)</button>
<button onclick="buySkin('green',150)">🟢 ירוק (150)</button>
<button onclick="closeShop()">⬅ חזרה</button>
</div>

<div id="ui">
💰 <span id="coins">0</span> | 🏆 <span id="level">1</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let coins = Number(localStorage.getItem("coins")||0);
let skin = localStorage.getItem("skin") || "yellow";
document.getElementById("coins").innerText = coins;

let level = 1;
let score = 0;

// ===== PLAYER =====
let player = {
    x: 200,
    y: 200,
    size: 30,
    speed: 4,
    inflated: false
};

// ===== ARRAYS =====
let fish = [];
let sharks = [];
let boss = null;
let gameRunning = false;

// ===== COLORS =====
const skins = {
    yellow: "yellow",
    red: "red",
    blue: "cyan",
    green: "lime"
};

// ===== SPAWN =====
function spawnFish(){
    let types = [
        {color:"white", value:1},
        {color:"gold", value:2},
        {color:"lime", value:3},
        {color:"cyan", value:5}
    ];

    let t = types[Math.floor(Math.random()*types.length)];

    fish.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: 20,
        color: t.color,
        value: t.value
    });
}

function spawnShark(){
    sharks.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: 50,
        speed: 2 + level*0.3
    });
}

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown", e=>{
    keys[e.key]=true;
    if(e.key===" ") player.inflated=true;
});
document.addEventListener("keyup", e=>{
    keys[e.key]=false;
    if(e.key===" ") player.inflated=false;
});

// MOBILE
canvas.addEventListener("touchmove", e=>{
    let t = e.touches[0];
    player.x = t.clientX;
    player.y = t.clientY;
});

// ===== DRAW FISH =====
function drawFish(x,y,size,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x,y,size, size*0.6,0,0,Math.PI*2);
    ctx.fill();

    // tail
    ctx.beginPath();
    ctx.moveTo(x-size,y);
    ctx.lineTo(x-size-10,y-10);
    ctx.lineTo(x-size-10,y+10);
    ctx.fill();
}

// ===== DRAW SHARK =====
function drawShark(s){
    ctx.fillStyle = "gray";
    ctx.beginPath();
    ctx.ellipse(s.x,s.y,s.size,s.size*0.5,0,0,Math.PI*2);
    ctx.fill();

    // fin
    ctx.beginPath();
    ctx.moveTo(s.x,s.y-s.size/2);
    ctx.lineTo(s.x+10,s.y-s.size);
    ctx.lineTo(s.x+20,s.y-s.size/2);
    ctx.fill();
}

// ===== LOOP =====
function gameLoop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // MOVE
    if(keys["ArrowUp"]) player.y-=player.speed;
    if(keys["ArrowDown"]) player.y+=player.speed;
    if(keys["ArrowLeft"]) player.x-=player.speed;
    if(keys["ArrowRight"]) player.x+=player.speed;

    let size = player.inflated ? 60 : 30;

    // PLAYER
    ctx.fillStyle = skins[skin];
    ctx.beginPath();
    ctx.arc(player.x, player.y, size, 0, Math.PI*2);
    ctx.fill();

    // spikes
    if(player.inflated){
        for(let i=0;i<20;i++){
            let a=i*(Math.PI*2/20);
            ctx.beginPath();
            ctx.moveTo(player.x,player.y);
            ctx.lineTo(player.x+Math.cos(a)*size*1.4, player.y+Math.sin(a)*size*1.4);
            ctx.strokeStyle="white";
            ctx.stroke();
        }
    }

    // FISH
    fish.forEach((f,i)=>{
        drawFish(f.x,f.y,f.size,f.color);

        if(Math.hypot(player.x-f.x, player.y-f.y)<30){
            coins+=f.value;
            score++;
            localStorage.setItem("coins",coins);
            document.getElementById("coins").innerText=coins;
            fish.splice(i,1);

            if(score%10===0){
                level++;
                document.getElementById("level").innerText=level;
            }
        }
    });

    // SHARK
    sharks.forEach(s=>{
        let dx=player.x-s.x;
        let dy=player.y-s.y;
        let d=Math.hypot(dx,dy);

        s.x+=dx/d*s.speed;
        s.y+=dy/d*s.speed;

        drawShark(s);

        if(d<40) die();
    });

    // BOSS
    if(level>=3 && !boss){
        boss={x:300,y:300,size:100,hp:20+level*5};
    }

    if(boss){
        ctx.fillStyle="purple";
        ctx.beginPath();
        ctx.arc(boss.x,boss.y,boss.size,0,Math.PI*2);
        ctx.fill();

        let dx=player.x-boss.x;
        let dy=player.y-boss.y;
        let d=Math.hypot(dx,dy);

        boss.x+=dx/d*1.2;

        if(d<80) die();

        if(player.inflated && d<120){
            boss.hp--;
            if(boss.hp<=0){
                alert("🔥 ניצחת את הבוס!");
                boss=null;
                level++;
            }
        }
    }

    requestAnimationFrame(gameLoop);
}

// ===== GAME =====
function startGame(){
    document.getElementById("lobby").style.display="none";
    gameRunning=true;

    setInterval(spawnFish,800);
    setInterval(spawnShark,4000);

    gameLoop();
}

// ===== SHOP =====
function openShop(){
    document.getElementById("lobby").style.display="none";
    document.getElementById("shop").style.display="flex";
}

function closeShop(){
    document.getElementById("shop").style.display="none";
    document.getElementById("lobby").style.display="flex";
}

function buySkin(name,price){
    if(coins>=price){
        coins-=price;
        skin=name;
        localStorage.setItem("coins",coins);
        localStorage.setItem("skin",name);
        document.getElementById("coins").innerText=coins;
        alert("קנית סקין!");
    }else{
        alert("אין מספיק כסף");
    }
}

// ===== DIE =====
function die(){
    alert("💀 נפסלת!");
    location.reload();
}
</script>

</body>
</html>
