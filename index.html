<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>🐡 דג הבלון</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background: radial-gradient(circle,#0af,#003);
}

canvas { display:block; }

.panel {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,40,0.9);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

button {
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#0af;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#08c;
}

#ui {
    position:absolute;
    top:10px;
    right:10px;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="panel">
<h1>🐡 דג הבלון</h1>
<p>אסוף דגים, התחמק מכרישים והביס את הבוס!</p>
<button onclick="startGame()">🎮 התחל</button>
<button onclick="openShop()">🛒 חנות</button>
</div>

<!-- SHOP -->
<div id="shop" class="panel" style="display:none;">
<h1>🛒 חנות סקינים</h1>
<div id="skins"></div>
<button onclick="closeShop()">⬅ חזור</button>
</div>

<!-- PAUSE -->
<div id="pause" class="panel" style="display:none;">
<h1>⏸️ המשחק נעצר</h1>
<button onclick="resume()">▶ המשך</button>
<button onclick="backToLobby()">🏠 לובי</button>
</div>

<div id="ui">
💰 <span id="coins">0</span> | 🏆 <span id="level">1</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let coins = Number(localStorage.getItem("coins")||0);
let owned = JSON.parse(localStorage.getItem("owned")||'["yellow"]');
let skin = localStorage.getItem("skin")||"yellow";

document.getElementById("coins").innerText = coins;

// ===== SKINS =====
const skins = {
    yellow:{color:"yellow",price:0},
    red:{color:"red",price:50},
    blue:{color:"cyan",price:100},
    green:{color:"lime",price:150}
};

// ===== PLAYER =====
let player = {x:200,y:200,size:30,speed:4,inflated:false};

// ===== GAME =====
let fish=[], sharks=[], boss=null;
let level=1, score=0;
let running=false;

// ===== CONTROLS =====
let keys={};
document.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.key===" ") player.inflated=true;

    if(e.key==="Escape"){
        if(running) pause();
    }
});
document.addEventListener("keyup",e=>{
    keys[e.key]=false;
    if(e.key===" ") player.inflated=false;
});

// MOBILE
canvas.addEventListener("touchmove",e=>{
    let t=e.touches[0];
    player.x=t.clientX;
    player.y=t.clientY;
});

// ===== DRAW =====
function drawFish(x,y,size,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.ellipse(x,y,size,size*0.6,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x-size,y);
    ctx.lineTo(x-size-10,y-10);
    ctx.lineTo(x-size-10,y+10);
    ctx.fill();
}

function drawShark(s){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.ellipse(s.x,s.y,s.size,s.size*0.5,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(s.x,s.y-s.size/2);
    ctx.lineTo(s.x+10,s.y-s.size);
    ctx.lineTo(s.x+20,s.y-s.size/2);
    ctx.fill();
}

// ===== SPAWN =====
function spawnFish(){
    let types=[
        {c:"white",v:1},
        {c:"gold",v:2},
        {c:"lime",v:3},
        {c:"cyan",v:5}
    ];
    let t=types[Math.floor(Math.random()*types.length)];
    fish.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:20,color:t.c,value:t.v});
}

function spawnShark(){
    sharks.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:50,speed:2+level*0.3});
}

// ===== LOOP =====
function loop(){
    if(!running) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // MOVE
    if(keys["ArrowUp"]) player.y-=player.speed;
    if(keys["ArrowDown"]) player.y+=player.speed;
    if(keys["ArrowLeft"]) player.x-=player.speed;
    if(keys["ArrowRight"]) player.x+=player.speed;

    let size=player.inflated?60:30;

    // PLAYER
    ctx.fillStyle=skins[skin].color;
    ctx.beginPath();
    ctx.arc(player.x,player.y,size,0,Math.PI*2);
    ctx.fill();

    if(player.inflated){
        for(let i=0;i<20;i++){
            let a=i*(Math.PI*2/20);
            ctx.beginPath();
            ctx.moveTo(player.x,player.y);
            ctx.lineTo(player.x+Math.cos(a)*size*1.4,player.y+Math.sin(a)*size*1.4);
            ctx.stroke();
        }
    }

    // FISH
    fish.forEach((f,i)=>{
        drawFish(f.x,f.y,f.size,f.color);

        if(Math.hypot(player.x-f.x,player.y-f.y)<30){
            coins+=f.value;
            score++;
            localStorage.setItem("coins",coins);
            document.getElementById("coins").innerText=coins;
            fish.splice(i,1);

            if(score%10===0){
                level++;
                document.getElementById("level").innerText=level;
            }
        }
    });

    // SHARKS
    sharks.forEach(s=>{
        let dx=player.x-s.x, dy=player.y-s.y;
        let d=Math.hypot(dx,dy);
        s.x+=dx/d*s.speed;
        s.y+=dy/d*s.speed;

        drawShark(s);

        if(d<40) die();
    });

    // BOSS
    if(level>=3 && !boss){
        boss={x:300,y:300,size:100,hp:20+level*5};
    }

    if(boss){
        ctx.fillStyle="purple";
        ctx.beginPath();
        ctx.arc(boss.x,boss.y,boss.size,0,Math.PI*2);
        ctx.fill();

        let dx=player.x-boss.x, dy=player.y-boss.y;
        let d=Math.hypot(dx,dy);

        boss.x+=dx/d*1.2;

        if(d<80) die();

        if(player.inflated && d<120){
            boss.hp--;
            if(boss.hp<=0){
                alert("🔥 ניצחת!");
                boss=null;
                level++;
            }
        }
    }

    requestAnimationFrame(loop);
}

// ===== UI =====
function startGame(){
    document.getElementById("lobby").style.display="none";
    running=true;

    setInterval(spawnFish,800);
    setInterval(spawnShark,4000);

    loop();
}

function pause(){
    running=false;
    document.getElementById("pause").style.display="flex";
}

function resume(){
    document.getElementById("pause").style.display="none";
    running=true;
    loop();
}

function backToLobby(){
    location.reload();
}

// ===== SHOP =====
function openShop(){
    document.getElementById("lobby").style.display="none";
    document.getElementById("shop").style.display="flex";

    let container=document.getElementById("skins");
    container.innerHTML="";

    for(let s in skins){
        let div=document.createElement("div");

        let ownedSkin=owned.includes(s);

        let btn;
        if(ownedSkin){
            btn=`<button onclick="equip('${s}')">Equip</button>`;
        }else{
            btn=`<button onclick="buy('${s}')">Buy (${skins[s].price})</button>`;
        }

        div.innerHTML=`
        <p>${s}</p>
        ${btn}
        `;
        container.appendChild(div);
    }
}

function closeShop(){
    document.getElementById("shop").style.display="none";
    document.getElementById("lobby").style.display="flex";
}

function buy(s){
    if(coins>=skins[s].price){
        coins-=skins[s].price;
        owned.push(s);
        localStorage.setItem("coins",coins);
        localStorage.setItem("owned",JSON.stringify(owned));
        openShop();
    }
}

function equip(s){
    skin=s;
    localStorage.setItem("skin",s);
    alert("סקין נבחר!");
}

// ===== DIE =====
function die(){
    alert("💀 נפסלת!");
    location.reload();
}
</script>

</body>
</html>
