<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>🐡 Pufferfish Game</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background: radial-gradient(circle,#0af,#003);
}
canvas { display:block; }

.panel {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,40,0.9);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

button {
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#0af;
    color:white;
}

#ui {
    position:absolute;
    top:10px;
    right:10px;
    color:white;
}
</style>
</head>

<body>

<div id="lobby" class="panel">
<h1>🐡 Pufferfish</h1>
<button onclick="startGame()">Start</button>
<button onclick="openShop()">Shop</button>
</div>

<div id="shop" class="panel" style="display:none;">
<h1>Shop</h1>
<div id="skins"></div>
<button onclick="closeShop()">Back</button>
</div>

<div id="pause" class="panel" style="display:none;">
<h1>Paused</h1>
<button onclick="resume()">Resume</button>
<button onclick="location.reload()">Exit</button>
</div>

<div id="ui">
💰 <span id="coins">0</span> | 🏆 <span id="level">1</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let coins = Number(localStorage.getItem("coins")||0);
let owned = JSON.parse(localStorage.getItem("owned")||'["yellow"]');
let skin = localStorage.getItem("skin")||"yellow";

document.getElementById("coins").innerText = coins;

// ===== SKINS =====
const skins = {
    yellow:{color:"yellow",price:0},
    red:{color:"red",price:50},
    blue:{color:"cyan",price:100},
    green:{color:"lime",price:150}
};

// ===== PLAYER =====
let player = {x:300,y:300,size:30,speed:4,inflated:false};

// ===== GAME =====
let fish=[], sharks=[], boss=null;
let level=1, score=0;
let running=false;

// ===== CONTROLS =====
let keys={};
document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;

    if(e.key===" ") player.inflated=true;

    if(e.key==="Escape" && running){
        pause();
    }
});
document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
    if(e.key===" ") player.inflated=false;
});

// MOBILE
canvas.addEventListener("touchmove",e=>{
    let t=e.touches[0];
    player.x=t.clientX;
    player.y=t.clientY;
});

// ===== DRAW PUFFER =====
function drawPufferfish(x,y,size,spikes,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();

    for(let i=0;i<spikes;i++){
        let a=i*(Math.PI*2/spikes);
        ctx.beginPath();
        ctx.moveTo(x+Math.cos(a)*size,y+Math.sin(a)*size);
        ctx.lineTo(x+Math.cos(a)*(size+10),y+Math.sin(a)*(size+10));
        ctx.stroke();
    }

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(x+size/3,y-size/3,5,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(x+size/3,y-size/3,2,0,Math.PI*2);
    ctx.fill();
}

// ===== DRAW ANGLER =====
function drawAngler(b){
    ctx.fillStyle="darkgreen";
    ctx.beginPath();
    ctx.ellipse(b.x,b.y,b.size,b.size*0.6,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(b.x+b.size/2,b.y,20,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="white";
    for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(b.x+b.size/2-10+i*5,b.y-10);
        ctx.lineTo(b.x+b.size/2-10+i*5,b.y+10);
        ctx.stroke();
    }

    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.moveTo(b.x,b.y-b.size);
    ctx.lineTo(b.x+20,b.y-b.size-20);
    ctx.stroke();

    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(b.x+20,b.y-b.size-20,6,0,Math.PI*2);
    ctx.fill();
}

// ===== DRAW FISH =====
function drawFish(x,y,size,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.ellipse(x,y,size,size*0.6,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x-size,y);
    ctx.lineTo(x-size-10,y-10);
    ctx.lineTo(x-size-10,y+10);
    ctx.fill();
}

// ===== LOOP =====
function loop(){
    if(!running) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // MOVE
    if(keys["arrowup"]||keys["w"]) player.y-=player.speed;
    if(keys["arrowdown"]||keys["s"]) player.y+=player.speed;
    if(keys["arrowleft"]||keys["a"]) player.x-=player.speed;
    if(keys["arrowright"]||keys["d"]) player.x+=player.speed;

    let size = player.inflated ? 60 : 30;

    // 🚫 LIMITS (IMPORTANT)
    player.x = Math.max(size, Math.min(canvas.width - size, player.x));
    player.y = Math.max(size, Math.min(canvas.height - size, player.y));

    // PLAYER
    drawPufferfish(player.x,player.y,size,player.inflated?25:10,skins[skin].color);

    // FISH
    fish.forEach((f,i)=>{
        drawFish(f.x,f.y,f.size,f.color);

        if(Math.hypot(player.x-f.x,player.y-f.y)<30){
            coins+=f.value;
            score++;
            localStorage.setItem("coins",coins);
            document.getElementById("coins").innerText=coins;
            fish.splice(i,1);

            if(score%10===0){
                level++;
                document.getElementById("level").innerText=level;
            }
        }
    });

    // SHARK
    sharks.forEach(s=>{
        let dx=player.x-s.x, dy=player.y-s.y;
        let d=Math.hypot(dx,dy);

        s.x+=dx/d*s.speed;
        s.y+=dy/d*s.speed;

        drawFish(s.x,s.y,s.size,"gray");

        if(d<40) die();
    });

    // BOSS
    if(level>=3 && !boss){
        boss={x:400,y:300,size:80,hp:20+level*5};
    }

    if(boss){
        drawAngler(boss);

        let dx=player.x-boss.x, dy=player.y-boss.y;
        let d=Math.hypot(dx,dy);

        boss.x+=dx/d*1.2;

        if(d<80) die();

        if(player.inflated && d<120){
            boss.hp--;
            if(boss.hp<=0){
                alert("🔥 You Win!");
                boss=null;
                level++;
            }
        }
    }

    requestAnimationFrame(loop);
}

// ===== GAME =====
function startGame(){
    document.getElementById("lobby").style.display="none";
    running=true;

    setInterval(()=>spawnFish(),800);
    setInterval(()=>spawnShark(),4000);

    loop();
}

function spawnFish(){
    let colors=["white","gold","lime","cyan"];
    let values=[1,2,3,5];
    let i=Math.floor(Math.random()*4);

    fish.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:20,
        color:colors[i],
        value:values[i]
    });
}

function spawnShark(){
    sharks.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:40,
        speed:2+level*0.3
    });
}

// ===== UI =====
function pause(){
    running=false;
    document.getElementById("pause").style.display="flex";
}
function resume(){
    document.getElementById("pause").style.display="none";
    running=true;
    loop();
}

// ===== SHOP =====
function openShop(){
    document.getElementById("lobby").style.display="none";
    document.getElementById("shop").style.display="flex";

    let container=document.getElementById("skins");
    container.innerHTML="";

    for(let s in skins){
        let ownedSkin=owned.includes(s);

        let btn = ownedSkin
            ? `<button onclick="equip('${s}')">Equip</button>`
            : `<button onclick="buy('${s}')">Buy (${skins[s].price})</button>`;

        container.innerHTML += `<div><p>${s}</p>${btn}</div>`;
    }
}

function closeShop(){
    document.getElementById("shop").style.display="none";
    document.getElementById("lobby").style.display="flex";
}

function buy(s){
    if(coins>=skins[s].price){
        coins-=skins[s].price;
        owned.push(s);
        localStorage.setItem("coins",coins);
        localStorage.setItem("owned",JSON.stringify(owned));
        openShop();
    }
}

function equip(s){
    skin=s;
    localStorage.setItem("skin",s);
    alert("Equipped!");
}

// ===== DIE =====
function die(){
    alert("💀 Game Over");
    location.reload();
}
</script>

</body>
</html>
