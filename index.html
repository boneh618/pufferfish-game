<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐡 דג הבלון</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #001020;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas { display:block; }

/* ===== HUD ===== */
.hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    z-index: 10;
    pointer-events: none;
}
.hud-right, .hud-left { display:flex; gap:8px; align-items:center; }
.hud-item {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 5px 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 5px;
}
.hud-coins { color: #ffd700; }
.hud-score { color: #4ade80; }
.hud-level { color: #60a5fa; }
#pause-btn {
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    backdrop-filter: blur(8px);
}
#pause-btn:active { transform: scale(0.9); }

/* ===== OVERLAYS (shared) ===== */
.overlay {
    position: fixed; inset: 0;
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 10px;
}
.overlay.show { display: flex; }

/* ===== LOBBY ===== */
#lobby {
    background: linear-gradient(180deg, #001030 0%, #003060 100%);
}
#lobby h1 { font-size: 40px; margin-bottom: 2px; }
#lobby .sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 16px; }
#lobby .saved-coins { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
.btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    padding: 13px 36px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    min-width: 200px;
    transition: transform 0.1s;
    font-family: inherit;
}
.btn:active { transform: scale(0.95); }
.btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
}
.btn-shop {
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

/* ===== GAME OVER ===== */
#gameover {
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
}
#gameover h2 { font-size: 30px; color: #f87171; }
#gameover .stats { color: rgba(255,255,255,0.7); font-size: 15px; }
#gameover .earned { color: #ffd700; font-size: 22px; font-weight: 700; }

/* ===== PAUSE ===== */
#pause-screen {
    background: rgba(0,0,20,0.88);
    backdrop-filter: blur(14px);
}
#pause-screen h2 { font-size: 34px; margin-bottom: 6px; }
#pause-screen .pause-sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 10px; }

/* ===== SHOP ===== */
#shop {
    background: linear-gradient(180deg, #0a0a1a 0%, #0f1b3d 100%);
    overflow-y: auto;
    padding: 20px;
}
#shop h2 { font-size: 28px; margin-bottom: 4px; }
#shop .shop-coins { color: #ffd700; font-size: 16px; margin-bottom: 16px; }
.skin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 20px;
}
.skin-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.2s;
}
.skin-card:active { transform: scale(0.95); }
.skin-card.owned { border-color: rgba(74,222,128,0.4); }
.skin-card.equipped { border-color: #4ade80; box-shadow: 0 0 16px rgba(74,222,128,0.2); }
.skin-card.locked { opacity: 0.7; }
.skin-preview {
    width: 60px; height: 60px;
    margin: 0 auto 8px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
.skin-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.skin-price { font-size: 12px; color: #ffd700; }
.skin-status { font-size: 11px; color: #4ade80; }

/* ===== INFLATE BUTTON (mobile) ===== */
#inflate-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    left: auto;
    transform: none;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,165,0,0.5), rgba(255,100,0,0.25));
    border: 3px solid rgba(255,165,0,0.4);
    color: white;
    font-size: 26px;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    backdrop-filter: blur(4px);
}

/* ===== VIRTUAL JOYSTICK ===== */
#joystick-zone {
    position: fixed;
    bottom: 10px;
    left: 10px;
    width: 140px; height: 140px;
    z-index: 20;
    display: none;
    pointer-events: auto;
}
#joystick-base {
    position: absolute;
    bottom: 0; left: 0;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
}
#joystick-thumb {
    position: absolute;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.35), rgba(255,255,255,0.1));
    border: 2px solid rgba(255,255,255,0.25);
    left: 35px; bottom: 35px;
    transition: none;
    pointer-events: none;
}

/* ===== LEVEL COMPLETE ===== */
#level-complete {
    background: rgba(0,0,20,0.85);
    backdrop-filter: blur(12px);
}
#level-complete h2 {
    font-size: 38px;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: levelPulse 0.6s ease;
}
#level-complete .level-num {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(99,102,241,0.5);
    animation: levelPop 0.5s ease 0.2s both;
}
#level-complete .level-reward {
    color: #ffd700;
    font-size: 20px;
    font-weight: 700;
}
#level-complete .level-msg {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    max-width: 280px;
    text-align: center;
    line-height: 1.5;
}
@keyframes levelPulse {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}
@keyframes levelPop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
}

/* ===== HP & ENERGY BARS ===== */
.hud-bar-container {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 5px 12px;
}
.hud-bar-label {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
}
.hud-bar-track {
    width: 80px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}
.hud-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.2s ease;
}
.hp-fill { background: linear-gradient(90deg, #ff4444, #ff6b6b); }
.energy-fill { background: linear-gradient(90deg, #ffa500, #ffcc00); }
.energy-full { background: linear-gradient(90deg, #4ade80, #22c55e); }

/* ===== PARTICLES ===== */
.coin-particle {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    font-weight: 800;
    color: #ffd700;
    z-index: 50;
    animation: particleUp 0.8s ease-out forwards;
}
@keyframes particleUp {
    0% { opacity:1; transform: translateY(0) scale(1); }
    100% { opacity:0; transform: translateY(-60px) scale(1.3); }
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="overlay show">
    <h1>🐡 דג הבלון</h1>
    <p class="sub">אסוף דגים • היזהר מכרישים • הילחם בבוס</p>
    <p class="saved-coins">💰 <span id="lobby-coins">0</span> מטבעות</p>
    <button class="btn" onclick="startGame()">🎮 התחל משחק</button>
    <button class="btn btn-shop" onclick="openShop()">🛒 חנות סקינים</button>
</div>

<!-- GAME OVER -->
<div id="gameover" class="overlay">
    <h2>💀 נפסלת!</h2>
    <p class="stats">ניקוד: <span id="go-score">0</span> &nbsp;|&nbsp; שלב: <span id="go-level">1</span></p>
    <p class="earned">+<span id="go-earned">0</span> 🪙</p>
    <p class="stats">סה״כ מטבעות: <span id="go-total">0</span></p>
    <button class="btn" onclick="startGame()">🔄 שחק שוב</button>
    <button class="btn btn-secondary" onclick="goLobby()">🏠 לובי</button>
</div>

<!-- PAUSE -->
<div id="pause-screen" class="overlay">
    <h2>⏸️ השהייה</h2>
    <p class="pause-sub">המשחק מושהה</p>
    <button class="btn" onclick="resumeGame()">▶️ המשך</button>
    <button class="btn btn-secondary" onclick="quitToLobby()">🏠 חזור ללובי</button>
</div>

<!-- LEVEL COMPLETE -->
<div id="level-complete" class="overlay">
    <h2>🎉 כל הכבוד!</h2>
    <div class="level-num" id="lc-level">2</div>
    <p class="level-reward">+<span id="lc-reward">0</span> 🪙 בונוס</p>
    <p class="level-msg" id="lc-msg">עברת את השלב! הבוס הבא יהיה קשה יותר...</p>
    <button class="btn" onclick="dismissLevelComplete()">🚀 המשך למשחק</button>
</div>

<!-- SHOP -->
<div id="shop" class="overlay">
    <h2>🛒 חנות סקינים</h2>
    <p class="shop-coins">💰 <span id="shop-coins">0</span> מטבעות</p>
    <div class="skin-grid" id="skin-grid"></div>
    <button class="btn btn-secondary" onclick="closeShop()">חזור</button>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none;">
    <div class="hud-left">
        <div class="hud-item hud-coins">🪙 <span id="hud-coins">0</span></div>
        <div class="hud-item hud-score">⭐ <span id="hud-score">0</span></div>
        <div class="hud-item hud-level">שלב <span id="hud-level">1</span></div>
    </div>
    <div style="position:fixed;bottom:12px;left:12px;display:flex;flex-direction:column;gap:6px;z-index:10;pointer-events:none;" id="bars-row">
        <div class="hud-bar-container">
            <span class="hud-bar-label">❤️</span>
            <div class="hud-bar-track">
                <div class="hud-bar-fill hp-fill" id="hp-bar" style="width:100%"></div>
            </div>
            <span class="hud-bar-label" id="hp-text" style="font-size:11px;color:#ff6b6b;">3/3</span>
        </div>
        <div class="hud-bar-container">
            <span class="hud-bar-label">🐡</span>
            <div class="hud-bar-track">
                <div class="hud-bar-fill energy-fill" id="energy-bar" style="width:100%"></div>
            </div>
            <span class="hud-bar-label" id="energy-text" style="font-size:11px;color:#ffcc00;">מוכן</span>
        </div>
    </div>
    <div class="hud-right">
        <div id="pause-btn" onclick="togglePause()">⏸</div>
    </div>
</div>

<!-- INFLATE BUTTON (mobile) -->
<div id="inflate-btn">🐡</div>

<!-- VIRTUAL JOYSTICK -->
<div id="joystick-zone">
    <div id="joystick-base">
        <div id="joystick-thumb"></div>
    </div>
</div>

<canvas id="game"></canvas>
