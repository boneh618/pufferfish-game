<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐡 דג הבלון</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #001020;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas { display:block; }

/* ===== HUD ===== */
.hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    z-index: 10;
    pointer-events: none;
}
.hud-right, .hud-left { display:flex; gap:8px; align-items:center; }
.hud-item {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 5px 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 5px;
}
.hud-coins { color: #ffd700; }
.hud-score { color: #4ade80; }
.hud-level { color: #60a5fa; }
#pause-btn {
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    backdrop-filter: blur(8px);
}
#pause-btn:active { transform: scale(0.9); }

/* ===== OVERLAYS (shared) ===== */
.overlay {
    position: fixed; inset: 0;
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 10px;
}
.overlay.show { display: flex; }

/* ===== LOBBY ===== */
#lobby {
    background: linear-gradient(180deg, #001030 0%, #003060 100%);
}
#lobby h1 { font-size: 40px; margin-bottom: 2px; }
#lobby .sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 16px; }
#lobby .saved-coins { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
.btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    padding: 13px 36px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    min-width: 200px;
    transition: transform 0.1s;
    font-family: inherit;
}
.btn:active { transform: scale(0.95); }
.btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
}
.btn-shop {
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

/* ===== GAME OVER ===== */
#gameover {
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
}
#gameover h2 { font-size: 30px; color: #f87171; }
#gameover .stats { color: rgba(255,255,255,0.7); font-size: 15px; }
#gameover .earned { color: #ffd700; font-size: 22px; font-weight: 700; }

/* ===== PAUSE ===== */
#pause-screen {
    background: rgba(0,0,20,0.88);
    backdrop-filter: blur(14px);
}
#pause-screen h2 { font-size: 34px; margin-bottom: 6px; }
#pause-screen .pause-sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 10px; }

/* ===== SHOP ===== */
#shop {
    background: linear-gradient(180deg, #0a0a1a 0%, #0f1b3d 100%);
    overflow-y: auto;
    padding: 20px;
}
#shop h2 { font-size: 28px; margin-bottom: 4px; }
#shop .shop-coins { color: #ffd700; font-size: 16px; margin-bottom: 16px; }
.skin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 20px;
}
.skin-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.2s;
}
.skin-card:active { transform: scale(0.95); }
.skin-card.owned { border-color: rgba(74,222,128,0.4); }
.skin-card.equipped { border-color: #4ade80; box-shadow: 0 0 16px rgba(74,222,128,0.2); }
.skin-card.locked { opacity: 0.7; }
.skin-preview {
    width: 60px; height: 60px;
    margin: 0 auto 8px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
.skin-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.skin-price { font-size: 12px; color: #ffd700; }
.skin-status { font-size: 11px; color: #4ade80; }

/* ===== INFLATE BUTTON (mobile) ===== */
#inflate-btn {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,165,0,0.5), rgba(255,100,0,0.25));
    border: 3px solid rgba(255,165,0,0.4);
    color: white;
    font-size: 26px;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    backdrop-filter: blur(4px);
}

/* ===== LEVEL COMPLETE ===== */
#level-complete {
    background: rgba(0,0,20,0.85);
    backdrop-filter: blur(12px);
}
#level-complete h2 {
    font-size: 38px;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: levelPulse 0.6s ease;
}
#level-complete .level-num {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(99,102,241,0.5);
    animation: levelPop 0.5s ease 0.2s both;
}
#level-complete .level-reward {
    color: #ffd700;
    font-size: 20px;
    font-weight: 700;
}
#level-complete .level-msg {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    max-width: 280px;
    text-align: center;
    line-height: 1.5;
}
@keyframes levelPulse {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}
@keyframes levelPop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
}

/* ===== HP & ENERGY BARS ===== */
.hud-bar-container {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 5px 12px;
}
.hud-bar-label {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
}
.hud-bar-track {
    width: 80px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}
.hud-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.2s ease;
}
.hp-fill { background: linear-gradient(90deg, #ff4444, #ff6b6b); }
.energy-fill { background: linear-gradient(90deg, #ffa500, #ffcc00); }
.energy-full { background: linear-gradient(90deg, #4ade80, #22c55e); }

/* ===== PARTICLES ===== */
.coin-particle {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    font-weight: 800;
    color: #ffd700;
    z-index: 50;
    animation: particleUp 0.8s ease-out forwards;
}
@keyframes particleUp {
    0% { opacity:1; transform: translateY(0) scale(1); }
    100% { opacity:0; transform: translateY(-60px) scale(1.3); }
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="overlay show">
    <h1>🐡 דג הבלון</h1>
    <p class="sub">אסוף דגים • היזהר מכרישים • הילחם בבוס</p>
    <p class="saved-coins">💰 <span id="lobby-coins">0</span> מטבעות</p>
    <button class="btn" onclick="startGame()">🎮 התחל משחק</button>
    <button class="btn btn-shop" onclick="openShop()">🛒 חנות סקינים</button>
</div>

<!-- GAME OVER -->
<div id="gameover" class="overlay">
    <h2>💀 נפסלת!</h2>
    <p class="stats">ניקוד: <span id="go-score">0</span> &nbsp;|&nbsp; שלב: <span id="go-level">1</span></p>
    <p class="earned">+<span id="go-earned">0</span> 🪙</p>
    <p class="stats">סה״כ מטבעות: <span id="go-total">0</span></p>
    <button class="btn" onclick="startGame()">🔄 שחק שוב</button>
    <button class="btn btn-secondary" onclick="goLobby()">🏠 לובי</button>
</div>

<!-- PAUSE -->
<div id="pause-screen" class="overlay">
    <h2>⏸️ השהייה</h2>
    <p class="pause-sub">המשחק מושהה</p>
    <button class="btn" onclick="resumeGame()">▶️ המשך</button>
    <button class="btn btn-secondary" onclick="quitToLobby()">🏠 חזור ללובי</button>
</div>

<!-- LEVEL COMPLETE -->
<div id="level-complete" class="overlay">
    <h2>🎉 כל הכבוד!</h2>
    <div class="level-num" id="lc-level">2</div>
    <p class="level-reward">+<span id="lc-reward">0</span> 🪙 בונוס</p>
    <p class="level-msg" id="lc-msg">עברת את השלב! הבוס הבא יהיה קשה יותר...</p>
    <button class="btn" onclick="dismissLevelComplete()">🚀 המשך למשחק</button>
</div>

<!-- SHOP -->
<div id="shop" class="overlay">
    <h2>🛒 חנות סקינים</h2>
    <p class="shop-coins">💰 <span id="shop-coins">0</span> מטבעות</p>
    <div class="skin-grid" id="skin-grid"></div>
    <button class="btn btn-secondary" onclick="closeShop()">חזור</button>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none;">
    <div class="hud-left">
        <div class="hud-item hud-coins">🪙 <span id="hud-coins">0</span></div>
        <div class="hud-item hud-score">⭐ <span id="hud-score">0</span></div>
        <div class="hud-item hud-level">שלב <span id="hud-level">1</span></div>
    </div>
    <div style="position:fixed;top:48px;left:0;right:0;display:flex;justify-content:center;gap:12px;padding:0 14px;z-index:10;pointer-events:none;" id="bars-row">
        <div class="hud-bar-container">
            <span class="hud-bar-label">❤️</span>
            <div class="hud-bar-track">
                <div class="hud-bar-fill hp-fill" id="hp-bar" style="width:100%"></div>
            </div>
            <span class="hud-bar-label" id="hp-text" style="font-size:11px;color:#ff6b6b;">3/3</span>
        </div>
        <div class="hud-bar-container">
            <span class="hud-bar-label">🐡</span>
            <div class="hud-bar-track">
                <div class="hud-bar-fill energy-fill" id="energy-bar" style="width:100%"></div>
            </div>
            <span class="hud-bar-label" id="energy-text" style="font-size:11px;color:#ffcc00;">מוכן</span>
        </div>
    </div>
    <div class="hud-right">
        <div id="pause-btn" onclick="togglePause()">⏸</div>
    </div>
</div>

<!-- INFLATE BUTTON (mobile) -->
<div id="inflate-btn">🐡</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===============================
//        SAVE / LOAD DATA
// ===============================
function loadData() {
    try {
        let d = JSON.parse(localStorage.getItem("puff_save"));
        if (d && typeof d === "object") return d;
    } catch(e) {}
    return { coins: 0, ownedSkins: ["classic"], equippedSkin: "classic", bestScore: 0, bestLevel: 0 };
}
function saveData() {
    localStorage.setItem("puff_save", JSON.stringify(gameData));
}

let gameData = loadData();

// ===============================
//            SKINS
// ===============================
const SKINS = [
    {
        id: "classic",
        name: "קלאסי",
        price: 0,
        bodyColor: "#ffcc00",
        inflatedColor: "#ff8c00",
        spikeColor: "#cc6600",
        eyeColor: "#222",
        finColor: "rgba(255,200,0,0.5)",
        glowColor: "#ffcc00",
        trailColor: "255,200,0",
        preview: "#ffcc00",
        special: null
    },
    {
        id: "ocean",
        name: "אוקיינוס",
        price: 50,
        bodyColor: "#00bfff",
        inflatedColor: "#0080ff",
        spikeColor: "#004488",
        eyeColor: "#001",
        finColor: "rgba(0,180,255,0.5)",
        glowColor: "#00bfff",
        trailColor: "0,180,255",
        preview: "#00bfff",
        special: null
    },
    {
        id: "lava",
        name: "לבה",
        price: 100,
        bodyColor: "#ff3300",
        inflatedColor: "#ff6600",
        spikeColor: "#cc0000",
        eyeColor: "#300",
        finColor: "rgba(255,100,0,0.5)",
        glowColor: "#ff4400",
        trailColor: "255,80,0",
        preview: "#ff3300",
        special: "fire"
    },
    {
        id: "ghost",
        name: "רוח רפאים",
        price: 150,
        bodyColor: "rgba(200,210,255,0.5)",
        inflatedColor: "rgba(180,190,255,0.6)",
        spikeColor: "rgba(150,160,200,0.5)",
        eyeColor: "#99aaff",
        finColor: "rgba(180,190,255,0.3)",
        glowColor: "#aabbff",
        trailColor: "180,190,255",
        preview: "#aabbdd",
        special: "ghost"
    },
    {
        id: "toxic",
        name: "רעיל",
        price: 120,
        bodyColor: "#39ff14",
        inflatedColor: "#00ff00",
        spikeColor: "#008800",
        eyeColor: "#030",
        finColor: "rgba(0,255,50,0.5)",
        glowColor: "#39ff14",
        trailColor: "50,255,20",
        preview: "#39ff14",
        special: "toxic"
    },
    {
        id: "royal",
        name: "מלכותי",
        price: 200,
        bodyColor: "#9b59b6",
        inflatedColor: "#8e44ad",
        spikeColor: "#6c3483",
        eyeColor: "#1a0025",
        finColor: "rgba(155,89,182,0.5)",
        glowColor: "#bb77dd",
        trailColor: "155,89,182",
        preview: "#9b59b6",
        special: "crown"
    },
    {
        id: "golden",
        name: "זהב",
        price: 300,
        bodyColor: "#ffd700",
        inflatedColor: "#ffaa00",
        spikeColor: "#b8860b",
        eyeColor: "#332200",
        finColor: "rgba(255,215,0,0.6)",
        glowColor: "#ffd700",
        trailColor: "255,215,0",
        preview: "#ffd700",
        special: "sparkle"
    },
    {
        id: "galaxy",
        name: "גלקסי",
        price: 500,
        bodyColor: "#1a0033",
        inflatedColor: "#2a0055",
        spikeColor: "#ff00ff",
        eyeColor: "#ff88ff",
        finColor: "rgba(150,0,255,0.5)",
        glowColor: "#aa00ff",
        trailColor: "150,0,255",
        preview: "#2a0055",
        special: "stars"
    }
];

function getSkin() {
    return SKINS.find(s => s.id === gameData.equippedSkin) || SKINS[0];
}

// ===============================
//         SHOP UI
// ===============================
function openShop() {
    document.getElementById("shop-coins").textContent = gameData.coins;
    renderShop();
    showOverlay("shop");
}
function closeShop() {
    showOverlay("lobby");
    document.getElementById("lobby-coins").textContent = gameData.coins;
}

function renderShop() {
    const grid = document.getElementById("skin-grid");
    grid.innerHTML = "";
    SKINS.forEach(skin => {
        const owned = gameData.ownedSkins.includes(skin.id);
        const equipped = gameData.equippedSkin === skin.id;
        const canBuy = gameData.coins >= skin.price;

        const card = document.createElement("div");
        card.className = "skin-card" + (equipped ? " equipped" : owned ? " owned" : " locked");

        let statusHTML = "";
        if (equipped) statusHTML = `<div class="skin-status">✔ מצויד</div>`;
        else if (owned) statusHTML = `<div class="skin-status" style="color:#60a5fa">לחץ לציוד</div>`;
        else statusHTML = `<div class="skin-price">${skin.price === 0 ? "חינם" : skin.price + " 🪙"}</div>`;

        let previewBg = skin.preview;
        if (skin.id === "ghost") previewBg = "rgba(170,187,221,0.3)";
        if (skin.id === "galaxy") previewBg = "linear-gradient(135deg, #1a0033, #0a001a, #2a0055)";

        let specialBadge = "";
        if (skin.special === "fire") specialBadge = "🔥";
        else if (skin.special === "ghost") specialBadge = "👻";
        else if (skin.special === "toxic") specialBadge = "☠️";
        else if (skin.special === "crown") specialBadge = "👑";
        else if (skin.special === "sparkle") specialBadge = "✨";
        else if (skin.special === "stars") specialBadge = "🌌";

        card.innerHTML = `
            <div class="skin-preview" style="background:${previewBg};border-radius:50%;">
                <span style="font-size:24px;">${specialBadge || "🐡"}</span>
            </div>
            <div class="skin-name">${skin.name}</div>
            ${statusHTML}
        `;

        card.onclick = () => {
            if (equipped) return;
            if (owned) {
                gameData.equippedSkin = skin.id;
                saveData();
                renderShop();
            } else if (canBuy) {
                gameData.coins -= skin.price;
                gameData.ownedSkins.push(skin.id);
                gameData.equippedSkin = skin.id;
                saveData();
                document.getElementById("shop-coins").textContent = gameData.coins;
                renderShop();
            }
        };
        grid.appendChild(card);
    });
}

// ===============================
//        OVERLAY MANAGER
// ===============================
const ALL_OVERLAYS = ["lobby","gameover","pause-screen","shop","level-complete"];
function showOverlay(id) {
    ALL_OVERLAYS.forEach(oid => {
        const el = document.getElementById(oid);
        if (oid === id) el.classList.add("show");
        else el.classList.remove("show");
    });
}
function hideAllOverlays() {
    ALL_OVERLAYS.forEach(oid => {
        document.getElementById(oid).classList.remove("show");
    });
}

// ===============================
//         GAME STATE
// ===============================
let player, fishList, sharks, boss, bubbles;
let gameRunning = false;
let paused = false;
let score, earnedCoins, level, levelTimer;
let spawnFishInterval, spawnSharkInterval;
let shakeTimer = 0;
let playerHp = 3;
const MAX_HP = 3;
const MAX_INFLATE_ENERGY = 120;
let inflateEnergy = MAX_INFLATE_ENERGY;
let inflateRechargeDelay = 0;
let invincibleTimer = 0;

function initGame() {
    player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        vx: 0, vy: 0,
        size: 22,
        inflated: false,
        inflateTimer: 0,
        trail: []
    };
    fishList = [];
    sharks = [];
    boss = null;
    bubbles = [];
    score = 0;
    earnedCoins = 0;
    level = 1;
    levelTimer = 0;
    shakeTimer = 0;
    paused = false;
    playerHp = MAX_HP;
    inflateEnergy = MAX_INFLATE_ENERGY;
    inflateRechargeDelay = 0;
    invincibleTimer = 0;
}

// ===== FISH TYPES =====
const fishTypes = [
    { color: "#ff6b6b", glowColor: "rgba(255,107,107,0.3)", value: 1, size: 16 },
    { color: "#ffd93d", glowColor: "rgba(255,217,61,0.3)", value: 2, size: 18 },
    { color: "#6bcb77", glowColor: "rgba(107,203,119,0.3)", value: 3, size: 20 },
    { color: "#4d96ff", glowColor: "rgba(77,150,255,0.3)", value: 5, size: 22 },
    { color: "#ff6fff", glowColor: "rgba(255,111,255,0.3)", value: 10, size: 14 }
];

// ===============================
//      DRAWING FUNCTIONS
// ===============================
function drawFishShape(x, y, size, color, glowColor, dir) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(-size * 0.8, 0);
    ctx.lineTo(-size * 1.5, -size * 0.6);
    ctx.lineTo(-size * 1.5, size * 0.6);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(size * 0.4, -size * 0.1, size * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.45, -size * 0.1, size * 0.09, 0, Math.PI * 2);
    ctx.fillStyle = "#111";
    ctx.fill();
    ctx.restore();
}

function drawShark(x, y, size, dir) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#667";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-size * 0.1, -size * 0.35);
    ctx.lineTo(size * 0.2, -size * 0.9);
    ctx.lineTo(size * 0.4, -size * 0.35);
    ctx.closePath();
    ctx.fillStyle = "#556";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-size * 0.8, 0);
    ctx.lineTo(-size * 1.4, -size * 0.5);
    ctx.lineTo(-size * 1.1, 0);
    ctx.lineTo(-size * 1.4, size * 0.5);
    ctx.closePath();
    ctx.fillStyle = "#556";
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, size * 0.1, size * 0.7, size * 0.2, 0, 0, Math.PI);
    ctx.fillStyle = "#aab";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.5, -size * 0.05, size * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.53, -size * 0.05, size * 0.05, 0, Math.PI * 2);
    ctx.fillStyle = "#c00";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(size * 0.7, size * 0.05);
    for (let i = 0; i < 4; i++) {
        let tx = size * 0.7 - i * size * 0.12;
        ctx.lineTo(tx - size * 0.06, size * 0.15);
        ctx.lineTo(tx - size * 0.12, size * 0.05);
    }
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.restore();
}

function drawPuffer(x, y, size, inflated) {
    const skin = getSkin();
    ctx.save();
    ctx.translate(x, y);

    let bodyColor = inflated ? skin.inflatedColor : skin.bodyColor;
    let bodySize = inflated ? size * 1.8 : size;

    ctx.shadowColor = skin.glowColor;
    ctx.shadowBlur = inflated ? 25 : 12;

    // Galaxy special: inner pattern
    if (skin.special === "stars") {
        ctx.beginPath();
        ctx.arc(0, 0, bodySize, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Stars inside body
        let t = Date.now() / 600;
        for (let i = 0; i < 12; i++) {
            let a = i * 0.52 + t * 0.3;
            let r = bodySize * (0.2 + (i % 3) * 0.2);
            let sx = Math.cos(a) * r, sy = Math.sin(a) * r;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(i * 50 + Date.now() / 10) % 360}, 100%, 80%)`;
            ctx.fill();
        }
    } else {
        ctx.beginPath();
        ctx.arc(0, 0, bodySize, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Belly highlight (skip for ghost)
    if (skin.special !== "ghost") {
        ctx.beginPath();
        ctx.arc(0, bodySize * 0.15, bodySize * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fill();
    }

    // Ghost special: wavy outline
    if (skin.special === "ghost") {
        ctx.strokeStyle = "rgba(200,210,255,0.3)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let a = 0; a < Math.PI * 2; a += 0.1) {
            let wave = Math.sin(a * 6 + Date.now() / 200) * 2;
            ctx.lineTo(Math.cos(a) * (bodySize + wave), Math.sin(a) * (bodySize + wave));
        }
        ctx.closePath();
        ctx.stroke();
    }

    // Fire special: flame particles around body
    if (skin.special === "fire" && inflated) {
        for (let i = 0; i < 8; i++) {
            let a = i * (Math.PI * 2 / 8) + Date.now() / 300;
            let fr = bodySize * 1.3 + Math.sin(Date.now() / 100 + i) * 5;
            ctx.beginPath();
            ctx.arc(Math.cos(a) * fr, Math.sin(a) * fr, 3, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? "#ff4400" : "#ffaa00";
            ctx.fill();
        }
    }

    // Toxic special: drip effect
    if (skin.special === "toxic") {
        for (let i = 0; i < 5; i++) {
            let dx = (i - 2) * bodySize * 0.3;
            let dripY = bodySize + Math.abs(Math.sin(Date.now() / 400 + i)) * 8;
            ctx.beginPath();
            ctx.ellipse(dx, dripY, 2.5, 4, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(50,255,20,0.5)";
            ctx.fill();
        }
    }

    // Crown special
    if (skin.special === "crown") {
        ctx.fillStyle = "#ffd700";
        let cy = -bodySize - 6;
        ctx.beginPath();
        ctx.moveTo(-bodySize * 0.4, cy);
        ctx.lineTo(-bodySize * 0.35, cy - 12);
        ctx.lineTo(-bodySize * 0.15, cy - 5);
        ctx.lineTo(0, cy - 14);
        ctx.lineTo(bodySize * 0.15, cy - 5);
        ctx.lineTo(bodySize * 0.35, cy - 12);
        ctx.lineTo(bodySize * 0.4, cy);
        ctx.closePath();
        ctx.fill();
    }

    // Sparkle special (golden)
    if (skin.special === "sparkle") {
        let t = Date.now() / 250;
        for (let i = 0; i < 6; i++) {
            let a = i * 1.05 + t;
            let sr = bodySize * 1.2 + Math.sin(t + i * 2) * 4;
            let alpha = 0.4 + Math.sin(t * 2 + i) * 0.3;
            ctx.beginPath();
            ctx.arc(Math.cos(a) * sr, Math.sin(a) * sr, 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,215,0,${alpha})`;
            ctx.fill();
        }
    }

    // Spikes when inflated
    if (inflated) {
        ctx.strokeStyle = skin.spikeColor;
        ctx.lineWidth = 2.5;
        for (let i = 0; i < 16; i++) {
            let a = i * (Math.PI * 2 / 16) + Math.sin(Date.now() / 200 + i) * 0.1;
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * bodySize, Math.sin(a) * bodySize);
            ctx.lineTo(Math.cos(a) * bodySize * 1.4, Math.sin(a) * bodySize * 1.4);
            ctx.stroke();
        }
    }

    // Eyes
    let eyeOff = bodySize * 0.35;
    for (let side of [-1, 1]) {
        ctx.beginPath();
        ctx.arc(side * eyeOff, -bodySize * 0.2, bodySize * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = skin.special === "ghost" ? "rgba(255,255,255,0.6)" : "#fff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(side * eyeOff + side * 2, -bodySize * 0.18, bodySize * 0.11, 0, Math.PI * 2);
        ctx.fillStyle = skin.eyeColor;
        ctx.fill();
    }

    // Mouth
    ctx.beginPath();
    ctx.arc(0, bodySize * 0.15, bodySize * 0.15, 0, Math.PI);
    ctx.strokeStyle = skin.spikeColor;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fins
    for (let side of [-1, 1]) {
        ctx.beginPath();
        ctx.ellipse(side * bodySize * 0.9, 0, bodySize * 0.25, bodySize * 0.12,
            side * 0.3 + Math.sin(Date.now() / 150) * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = skin.finColor;
        ctx.fill();
    }

    ctx.restore();
}

function drawBoss(x, y, size, hp, maxHp) {
    ctx.save();
    ctx.translate(x, y);

    let t = Date.now() / 400;
    let sway = Math.sin(t) * 3;

    // === ANGLERFISH ===

    // Dark body – elongated, lumpy deep-sea shape
    ctx.shadowColor = "#003366";
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.ellipse(0, sway, size, size * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#1a1a2e";
    ctx.fill();
    ctx.shadowBlur = 0;

    // Darker belly shading
    ctx.beginPath();
    ctx.ellipse(0, sway + size * 0.15, size * 0.7, size * 0.35, 0, 0, Math.PI);
    ctx.fillStyle = "rgba(10,10,30,0.5)";
    ctx.fill();

    // Bumpy texture
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 8; i++) {
        let bx = (i - 4) * size * 0.18;
        let by = sway + Math.sin(i * 1.5) * size * 0.2;
        ctx.beginPath();
        ctx.arc(bx, by, size * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = "#334";
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Tail fin – ragged deep-sea style
    ctx.beginPath();
    ctx.moveTo(-size * 0.85, sway);
    ctx.quadraticCurveTo(-size * 1.3, sway - size * 0.5, -size * 1.5, sway - size * 0.35);
    ctx.lineTo(-size * 1.1, sway);
    ctx.lineTo(-size * 1.5, sway + size * 0.35);
    ctx.quadraticCurveTo(-size * 1.3, sway + size * 0.5, -size * 0.85, sway);
    ctx.closePath();
    ctx.fillStyle = "#151528";
    ctx.fill();

    // Small pectoral fin
    let finWave = Math.sin(t * 2) * 0.2;
    ctx.beginPath();
    ctx.ellipse(-size * 0.2, sway + size * 0.4, size * 0.22, size * 0.08,
        finWave + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(30,30,60,0.6)";
    ctx.fill();

    // Dorsal spines (small jagged fins)
    for (let i = 0; i < 4; i++) {
        let sx = -size * 0.4 + i * size * 0.22;
        let sh = size * 0.12 + Math.sin(t + i) * 3;
        ctx.beginPath();
        ctx.moveTo(sx, sway - size * 0.55);
        ctx.lineTo(sx + size * 0.05, sway - size * 0.55 - sh);
        ctx.lineTo(sx + size * 0.1, sway - size * 0.55);
        ctx.closePath();
        ctx.fillStyle = "#222240";
        ctx.fill();
    }

    // ===== ILLICIUM (lure stalk) + ESCA (glowing lure) =====
    let stalkBaseX = size * 0.5;
    let stalkBaseY = sway - size * 0.5;
    let lureSwing = Math.sin(t * 1.5) * 12;
    let lureX = stalkBaseX + size * 0.3 + lureSwing;
    let lureY = stalkBaseY - size * 0.6 + Math.cos(t * 1.2) * 5;

    // Stalk (illicium)
    ctx.beginPath();
    ctx.moveTo(stalkBaseX, stalkBaseY);
    ctx.quadraticCurveTo(stalkBaseX + size * 0.4, stalkBaseY - size * 0.9, lureX, lureY);
    ctx.strokeStyle = "#2a2a45";
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Esca glow (outer)
    let lureGlow = 0.4 + Math.sin(t * 3) * 0.2;
    let lureRadius = size * 0.12 + Math.sin(t * 4) * 2;
    ctx.beginPath();
    ctx.arc(lureX, lureY, lureRadius * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,200,255,${lureGlow * 0.15})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(lureX, lureY, lureRadius * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150,220,255,${lureGlow * 0.25})`;
    ctx.fill();
    // Esca bulb (inner bright)
    ctx.shadowColor = "#66ccff";
    ctx.shadowBlur = 20 + Math.sin(t * 3) * 8;
    ctx.beginPath();
    ctx.arc(lureX, lureY, lureRadius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,240,255,${0.7 + Math.sin(t * 3) * 0.3})`;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Esca sparkle
    ctx.beginPath();
    ctx.arc(lureX - 2, lureY - 2, lureRadius * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // ===== HUGE MOUTH with teeth =====
    // Lower jaw
    ctx.beginPath();
    ctx.moveTo(size * 0.5, sway + size * 0.1);
    ctx.quadraticCurveTo(size * 0.9, sway + size * 0.5, size * 0.7, sway + size * 0.55);
    ctx.lineTo(size * 0.3, sway + size * 0.35);
    ctx.closePath();
    ctx.fillStyle = "#220010";
    ctx.fill();
    // Upper jaw
    ctx.beginPath();
    ctx.moveTo(size * 0.5, sway - size * 0.1);
    ctx.quadraticCurveTo(size * 0.95, sway - size * 0.3, size * 0.7, sway - size * 0.45);
    ctx.lineTo(size * 0.3, sway - size * 0.25);
    ctx.closePath();
    ctx.fillStyle = "#1a0010";
    ctx.fill();
    // Mouth interior
    ctx.beginPath();
    ctx.ellipse(size * 0.55, sway, size * 0.25, size * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#300020";
    ctx.fill();

    // TEETH – sharp, jagged, translucent
    ctx.fillStyle = "rgba(220,230,255,0.9)";
    // Top teeth
    for (let i = 0; i < 6; i++) {
        let tx = size * 0.4 + i * size * 0.1;
        let ty1 = sway - size * 0.1 - Math.sin(i * 0.8) * size * 0.08;
        let tLen = size * 0.12 + (i % 2) * size * 0.06;
        ctx.beginPath();
        ctx.moveTo(tx - 2, ty1);
        ctx.lineTo(tx + 1, ty1 + tLen);
        ctx.lineTo(tx + 4, ty1);
        ctx.closePath();
        ctx.fill();
    }
    // Bottom teeth
    for (let i = 0; i < 5; i++) {
        let tx = size * 0.42 + i * size * 0.1;
        let ty1 = sway + size * 0.1 + Math.sin(i * 0.9) * size * 0.06;
        let tLen = size * 0.1 + (i % 2) * size * 0.05;
        ctx.beginPath();
        ctx.moveTo(tx - 2, ty1);
        ctx.lineTo(tx + 1, ty1 - tLen);
        ctx.lineTo(tx + 4, ty1);
        ctx.closePath();
        ctx.fill();
    }

    // Eye – small, deep-set, menacing
    ctx.beginPath();
    ctx.arc(size * 0.35, sway - size * 0.25, size * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = "#112";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.35, sway - size * 0.25, size * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = "#ff3300";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.36, sway - size * 0.25, size * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = "#000";
    ctx.fill();
    // Eye glint
    ctx.beginPath();
    ctx.arc(size * 0.33, sway - size * 0.27, size * 0.015, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // Deep-sea ambient particles around boss
    for (let i = 0; i < 6; i++) {
        let pa = i * 1.05 + t * 0.5;
        let pr = size * 1.3 + Math.sin(t + i * 2) * 8;
        let palpha = 0.15 + Math.sin(t * 2 + i) * 0.1;
        ctx.beginPath();
        ctx.arc(Math.cos(pa) * pr, sway + Math.sin(pa) * pr, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,180,255,${palpha})`;
        ctx.fill();
    }

    // HP bar
    let barW = size * 1.8, barH = 8;
    let barY = sway - size * 0.75 - 20;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.beginPath();
    ctx.roundRect(-barW/2, barY, barW, barH, 4);
    ctx.fill();
    ctx.fillStyle = hp > maxHp * 0.3 ? "#f44" : "#ff0";
    ctx.beginPath();
    ctx.roundRect(-barW/2, barY, barW * (hp / maxHp), barH, 4);
    ctx.fill();
    // Boss label
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("🎣 BOSS", 0, barY - 5);

    ctx.restore();
}

// ===== WATER BACKGROUND =====
let waterOffset = 0;
function drawWater() {
    let g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, "#001830");
    g.addColorStop(0.5, "#003060");
    g.addColorStop(1, "#005090");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    waterOffset += 0.3;
    ctx.strokeStyle = "rgba(100,180,255,0.06)";
    ctx.lineWidth = 1.5;
    for (let row = 0; row < 12; row++) {
        ctx.beginPath();
        let baseY = row * (canvas.height / 10) + (waterOffset % 80);
        for (let x = 0; x < canvas.width; x += 5) {
            ctx.lineTo(x, baseY + Math.sin(x / 80 + waterOffset / 20 + row) * 8);
        }
        ctx.stroke();
    }
}

// ===== BUBBLES =====
function spawnBubble(x, y) {
    bubbles.push({ x: x + (Math.random()-0.5)*20, y, r: 2+Math.random()*4, speed: 0.5+Math.random()*1.5, life: 1 });
}
function updateBubbles() {
    for (let i = bubbles.length - 1; i >= 0; i--) {
        let b = bubbles[i];
        b.y -= b.speed;
        b.x += Math.sin(b.y / 20) * 0.3;
        b.life -= 0.008;
        if (b.life <= 0) { bubbles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(150,220,255,${b.life * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

// ===== SPAWN =====
function spawnFish() {
    if (!gameRunning || paused) return;
    let type = fishTypes[Math.floor(Math.random() * fishTypes.length)];
    if (type.value >= 10 && Math.random() > 0.15) type = fishTypes[Math.floor(Math.random() * 4)];
    let edge = Math.floor(Math.random() * 4);
    let x, y, vx, vy, sp = 0.5 + Math.random() * 1.5;
    if (edge===0){x=-30;y=Math.random()*canvas.height;vx=sp;vy=(Math.random()-0.5)*0.5;}
    else if(edge===1){x=canvas.width+30;y=Math.random()*canvas.height;vx=-sp;vy=(Math.random()-0.5)*0.5;}
    else if(edge===2){y=-30;x=Math.random()*canvas.width;vy=sp;vx=(Math.random()-0.5)*0.5;}
    else{y=canvas.height+30;x=Math.random()*canvas.width;vy=-sp;vx=(Math.random()-0.5)*0.5;}
    fishList.push({ x,y,vx,vy,...type,dir:vx>0?1:-1,wobble:Math.random()*100 });
}
function spawnShark() {
    if (!gameRunning || paused) return;
    let edge = Math.floor(Math.random() * 4);
    let x, y;
    if(edge===0){x=-60;y=Math.random()*canvas.height;}
    else if(edge===1){x=canvas.width+60;y=Math.random()*canvas.height;}
    else if(edge===2){y=-60;x=Math.random()*canvas.width;}
    else{y=canvas.height+60;x=Math.random()*canvas.width;}
    sharks.push({ x,y,size:35+Math.random()*15,speed:1.2+level*0.25+Math.random()*0.5,dir:1 });
}

// ===== CONTROLS =====
let keys = {};
let touchTarget = null;

document.addEventListener("keydown", e => {
    if (e.key === "Escape") { togglePause(); return; }
    if (paused) return;
    keys[e.key] = true;
    if (e.key === " " && player) player.inflated = true;
    e.preventDefault();
});
document.addEventListener("keyup", e => {
    keys[e.key] = false;
    if (e.key === " " && player) player.inflated = false;
});

canvas.addEventListener("touchstart", e => { e.preventDefault(); if(paused)return; let t=e.touches[0]; touchTarget={x:t.clientX,y:t.clientY}; });
canvas.addEventListener("touchmove", e => { e.preventDefault(); if(paused)return; let t=e.touches[0]; touchTarget={x:t.clientX,y:t.clientY}; });
canvas.addEventListener("touchend", e => { e.preventDefault(); touchTarget=null; });

const infBtn = document.getElementById("inflate-btn");
infBtn.addEventListener("touchstart", e => { e.preventDefault(); e.stopPropagation(); if(player && inflateEnergy > 0)player.inflated=true; });
infBtn.addEventListener("touchend", e => { e.preventDefault(); e.stopPropagation(); if(player)player.inflated=false; });

// ===== PAUSE =====
function togglePause() {
    if (!gameRunning) return;
    if (paused) resumeGame();
    else pauseGame();
}
function pauseGame() {
    paused = true;
    showOverlay("pause-screen");
}
function resumeGame() {
    paused = false;
    hideAllOverlays();
    document.getElementById("hud").style.display = "flex";
}
function quitToLobby() {
    gameRunning = false;
    paused = false;
    clearInterval(spawnFishInterval);
    clearInterval(spawnSharkInterval);
    if (isMobile) infBtn.style.display = "none";
    document.getElementById("hud").style.display = "none";
    // Save earned coins
    gameData.coins += earnedCoins;
    saveData();
    document.getElementById("lobby-coins").textContent = gameData.coins;
    showOverlay("lobby");
}

// ===== LEVELS =====
function getMaxBossHp() { return 10 + level * 5; }

const levelMessages = [
    "רק מתחממים! הבוס הבא לא יהיה כזה קל...",
    "מרשים! אתה שוחה כמו אלוף!",
    "הכרישים רועדים מפחד ממך!",
    "בלתי ניתן לעצירה! ממשיכים!",
    "אגדה של האוקיינוס! 🌊",
    "אין מי שיעצור אותך!",
    "מלך הים העמוק! 👑",
];

function levelUp() {
    level++;
    boss = null;
    let bonus = level * 5;
    earnedCoins += bonus;
    updateHUD();
    // Show level complete screen
    paused = true;
    document.getElementById("lc-level").textContent = level;
    document.getElementById("lc-reward").textContent = bonus;
    document.getElementById("lc-msg").textContent = levelMessages[Math.min(level - 2, levelMessages.length - 1)];
    showOverlay("level-complete");
}

function dismissLevelComplete() {
    paused = false;
    hideAllOverlays();
    document.getElementById("hud").style.display = "flex";
}

// ===== HUD =====
function updateHUD() {
    document.getElementById("hud-coins").textContent = earnedCoins;
    document.getElementById("hud-score").textContent = score;
    document.getElementById("hud-level").textContent = level;
}
function showParticle(x, y, text) {
    let el = document.createElement("div");
    el.className = "coin-particle";
    el.textContent = text;
    el.style.left = (x - 30) + "px";
    el.style.top = y + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
}

function updateBars() {
    // HP bar
    let hpPct = (playerHp / MAX_HP) * 100;
    document.getElementById("hp-bar").style.width = hpPct + "%";
    document.getElementById("hp-text").textContent = playerHp + "/" + MAX_HP;
    // Energy bar
    let ePct = (inflateEnergy / MAX_INFLATE_ENERGY) * 100;
    let eBar = document.getElementById("energy-bar");
    eBar.style.width = ePct + "%";
    eBar.className = "hud-bar-fill " + (ePct >= 100 ? "energy-full" : "energy-fill");
    let eTxt = document.getElementById("energy-text");
    if (ePct >= 100) { eTxt.textContent = "מוכן"; eTxt.style.color = "#4ade80"; }
    else { eTxt.textContent = Math.round(ePct) + "%"; eTxt.style.color = "#ffcc00"; }
}

// ===============================
//        MAIN GAME LOOP
// ===============================
function gameLoop() {
    if (!gameRunning) return;
    requestAnimationFrame(gameLoop);
    if (paused) return;

    const skin = getSkin();

    ctx.save();
    if (shakeTimer > 0) {
        shakeTimer--;
        ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*8);
    }
    drawWater();

    // ===== MOVE PLAYER (slower speed: was 4.5, now 2.8) =====
    let speed = 2.8;
    let ax = 0, ay = 0;
    if (keys["ArrowUp"]||keys["w"]) ay -= 1;
    if (keys["ArrowDown"]||keys["s"]) ay += 1;
    if (keys["ArrowLeft"]||keys["a"]) ax -= 1;
    if (keys["ArrowRight"]||keys["d"]) ax += 1;

    if (touchTarget) {
        let dx = touchTarget.x - player.x;
        let dy = touchTarget.y - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 10) { ax = dx/dist; ay = dy/dist; }
    }

    let mag = Math.hypot(ax, ay);
    if (mag > 0) { ax /= mag; ay /= mag; }

    player.vx += ax * 0.5;
    player.vy += ay * 0.5;
    player.vx *= 0.89;
    player.vy *= 0.89;
    player.x += player.vx * speed * 0.5;
    player.y += player.vy * speed * 0.5;

    let ps = player.inflated ? player.size * 1.8 : player.size;
    player.x = Math.max(ps, Math.min(canvas.width - ps, player.x));
    player.y = Math.max(ps, Math.min(canvas.height - ps, player.y));

    // Trail (skin colored)
    player.trail.push({ x: player.x, y: player.y, life: 1 });
    if (player.trail.length > 15) player.trail.shift();
    for (let t of player.trail) {
        t.life -= 0.07;
        if (t.life > 0) {
            ctx.beginPath();
            ctx.arc(t.x, t.y, ps * t.life * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${skin.trailColor},${t.life * 0.12})`;
            ctx.fill();
        }
    }

    // Invincibility flash after hit
    if (invincibleTimer > 0) invincibleTimer--;

    // Inflate energy system
    if (player.inflated) {
        inflateEnergy--;
        if (inflateEnergy <= 0) { player.inflated = false; inflateEnergy = 0; inflateRechargeDelay = 40; }
    } else {
        if (inflateRechargeDelay > 0) inflateRechargeDelay--;
        else if (inflateEnergy < MAX_INFLATE_ENERGY) inflateEnergy += 1.5;
        if (inflateEnergy > MAX_INFLATE_ENERGY) inflateEnergy = MAX_INFLATE_ENERGY;
    }
    // Block inflate if no energy
    if (inflateEnergy <= 0) player.inflated = false;
    updateBars();

    if (Math.random() < 0.15) spawnBubble(player.x, player.y - ps);
    // Invincibility blink effect
    if (invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2 === 0) {
        ctx.globalAlpha = 0.3;
    }
    drawPuffer(player.x, player.y, player.size, player.inflated);
    ctx.globalAlpha = 1;

    // ===== FISH =====
    for (let i = fishList.length - 1; i >= 0; i--) {
        let f = fishList[i];
        f.x += f.vx;
        f.y += f.vy + Math.sin(f.wobble + Date.now() / 500) * 0.3;
        f.dir = f.vx > 0 ? 1 : -1;
        if (f.x < -80 || f.x > canvas.width+80 || f.y < -80 || f.y > canvas.height+80) { fishList.splice(i,1); continue; }
        drawFishShape(f.x, f.y, f.size, f.color, f.glowColor, f.dir);
        let dist = Math.hypot(player.x - f.x, player.y - f.y);
        if (dist < ps + f.size * 0.6) {
            earnedCoins += f.value;
            score++;
            fishList.splice(i, 1);
            showParticle(f.x, f.y, `+${f.value}🪙`);
            spawnBubble(f.x, f.y);
            spawnBubble(f.x, f.y);
            updateHUD();
        }
    }

    // ===== SHARKS =====
    for (let i = sharks.length - 1; i >= 0; i--) {
        let s = sharks[i];
        let dx = player.x - s.x, dy = player.y - s.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 0) { s.x += (dx/dist)*s.speed; s.y += (dy/dist)*s.speed; }
        s.dir = dx > 0 ? 1 : -1;
        drawShark(s.x, s.y, s.size, s.dir);
        if (dist < ps + s.size * 0.5) {
            if (player.inflated) {
                sharks.splice(i, 1);
                score += 2; earnedCoins += 3;
                shakeTimer = 6;
                showParticle(s.x, s.y, "💥 +3🪙");
                for (let b = 0; b < 5; b++) spawnBubble(s.x, s.y);
                updateHUD();
            } else if (invincibleTimer <= 0) {
                playerHp--;
                shakeTimer = 8;
                showParticle(player.x, player.y - ps, `💔 ${playerHp}/${MAX_HP}`);
                invincibleTimer = 60;
                sharks.splice(i, 1);
                updateBars();
                if (playerHp <= 0) { die(); return; }
            }
        }
        if (s.x<-200||s.x>canvas.width+200||s.y<-200||s.y>canvas.height+200) sharks.splice(i,1);
    }

    // ===== BOSS =====
    if (score > 0 && score % 15 === 0 && !boss && score > (level-1)*15) {
        let maxHp = getMaxBossHp();
        boss = { x:canvas.width/2, y:-80, size:60+level*8, hp:maxHp, maxHp, speed:1+level*0.2, dir:1 };
    }
    if (boss) {
        let dx = player.x-boss.x, dy = player.y-boss.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 0) { boss.x += (dx/dist)*boss.speed; boss.y += (dy/dist)*boss.speed; }
        boss.dir = dx > 0 ? 1 : -1;
        drawBoss(boss.x, boss.y, boss.size, boss.hp, boss.maxHp);
        if (dist < ps + boss.size * 0.5) {
            if (player.inflated) {
                boss.hp -= 2; shakeTimer = 4;
                showParticle(boss.x, boss.y - boss.size, `💥 ${boss.hp}/${boss.maxHp}`);
                boss.x -= (dx/dist)*30; boss.y -= (dy/dist)*30;
                if (boss.hp <= 0) {
                    let reward = 20 + level * 10;
                    earnedCoins += reward; score += 5; shakeTimer = 12;
                    showParticle(boss.x, boss.y, `🏆 בוס הובס! +${reward}🪙`);
                    for (let b = 0; b < 12; b++) spawnBubble(boss.x, boss.y);
                    levelUp();
                }
                updateHUD();
            } else if (invincibleTimer <= 0) {
                // Boss deals full damage – instant kill
                playerHp = 0;
                shakeTimer = 12;
                updateBars();
                die(); return;
            }
        }
    }

    updateBubbles();
    ctx.restore();
    levelTimer++;
}

// ===============================
//     START / DIE / LOBBY
// ===============================
function startGame() {
    hideAllOverlays();
    document.getElementById("hud").style.display = "flex";
    if (isMobile) infBtn.style.display = "flex";

    initGame();
    updateHUD();
    gameRunning = true;

    clearInterval(spawnFishInterval);
    clearInterval(spawnSharkInterval);
    spawnFishInterval = setInterval(spawnFish, 800);
    spawnSharkInterval = setInterval(spawnShark, 4000);

    for (let i = 0; i < 6; i++) spawnFish();
    gameLoop();
}

function die() {
    gameRunning = false;
    clearInterval(spawnFishInterval);
    clearInterval(spawnSharkInterval);
    if (isMobile) infBtn.style.display = "none";
    document.getElementById("hud").style.display = "none";

    gameData.coins += earnedCoins;
    if (score > gameData.bestScore) gameData.bestScore = score;
    if (level > gameData.bestLevel) gameData.bestLevel = level;
    saveData();

    document.getElementById("go-score").textContent = score;
    document.getElementById("go-level").textContent = level;
    document.getElementById("go-earned").textContent = earnedCoins;
    document.getElementById("go-total").textContent = gameData.coins;
    showOverlay("gameover");
}

function goLobby() {
    document.getElementById("lobby-coins").textContent = gameData.coins;
    showOverlay("lobby");
}

// Init lobby
document.getElementById("lobby-coins").textContent = gameData.coins;
</script>
