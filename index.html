<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>משחק כדורגל</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(#0f2027, #2c5364);
        color: white;
        text-align: center;
    }

    h1 {
        margin: 10px;
    }

    #game {
        margin: auto;
        background: #1e7f3f;
        border: 5px solid white;
        border-radius: 15px;
        display: block;
    }

    #score {
        font-size: 22px;
        margin: 10px;
    }

    #bracelet {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: black;
        padding: 15px;
        border-radius: 12px;
        border: 2px solid red;
        display: none;
        animation: pop 0.5s ease;
    }

    @keyframes pop {
        from { transform: scale(0); }
        to { transform: scale(1); }
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #00c853;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>⚽ משחק כדורגל</h1>
<div id="score">גולים: 0</div>

<canvas id="game" width="600" height="400"></canvas>

<div id="bracelet">
    ⌚ שיחקת יותר מדי! קח הפסקה!
    <br><br>
    <button onclick="closeBracelet()">סגור</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 200, size: 15 };
let ball = { x: 300, y: 200, size: 10, vx: 0, vy: 0 };
let goal = { x: 550, y: 150, w: 40, h: 100 };

let score = 0;
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function update() {
    // movement
    if (keys["w"]) player.y -= 3;
    if (keys["s"]) player.y += 3;
    if (keys["a"]) player.x -= 3;
    if (keys["d"]) player.x += 3;

    // borders
    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    // ball physics
    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < player.size + ball.size) {
        ball.vx = dx * 0.3;
        ball.vy = dy * 0.3;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    ball.vx *= 0.98;
    ball.vy *= 0.98;

    // goal detection
    if (
        ball.x > goal.x &&
        ball.y > goal.y &&
        ball.y < goal.y + goal.h
    ) {
        score++;
        document.getElementById("score").innerText = "גולים: " + score;
        resetBall();
    }
}

function resetBall() {
    ball.x = 300;
    ball.y = 200;
    ball.vx = 0;
    ball.vy = 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // field
    ctx.fillStyle = "#1e7f3f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // goal
    ctx.fillStyle = "white";
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

    // player
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();

    // ball
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
    ctx.fill();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// bracelet system
setTimeout(() => {
    document.getElementById("bracelet").style.display = "block";
}, 20000); // after 20 seconds

function closeBracelet() {
    document.getElementById("bracelet").style.display = "none";
}
</script>

</body>
</html>
